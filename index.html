.box{margin-top:15px;padding:12px;border:2px solid;border-radius:6px}

}

}

  var tx=t();
  document.getElementById('appTitle').textContent=tx.appTitle;

  document.getElementById('calcBtn').textContent=tx.calcBtn;
  document.getElementById('festBtn').textContent='\u1F54E '+tx.festTitle;
  document.getElementById('sts').textContent=tx.detecting;
}

// ── Utilities ─────────────────────────────────────────────
function cap(s){if(!s)return s;return s.split(' ').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');}
function dateStr(){var n=new Date();return n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function cityDateStr(tz){var now=new Date(),d=new Date(now.getTime()+tz*3600000);return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate());}
function fmt(m){m=((m%1440)+1440)%1440;var h=Math.floor(m/60),mm=Math.round(m%60),ap=h<12?'AM':'PM',h12=h%12===0?12:h%12;return h12+':'+pad(mm)+' '+ap;}
function div(s,e){var p=(e-s)/8,a=[];for(var i=0;i<8;i++)a.push([s+i*p,s+(i+1)*p]);return a;}
function inP(v,s,e){return v>=s&&v<e;}

  return{p:s2m?t2:t1,s:s2m?t1:t2,bt:bt,s2m:s2m,mEN:mEN,mHI:mHI,isAd:isAd&&!isKr};
}

// ── Main Calculate ────────────────────────────────────────
var gLat=null,gLon=null,uDate=false;

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('date').addEventListener('change',function(){uDate=true;calculate();});
  var tm=null;
  document.getElementById('city').addEventListener('input',function(){
    clearTimeout(tm);uDate=false;
    if(document.getElementById('city').value.trim().length>=3)tm=setTimeout(calculate,1500);
  });
});

function calculate(){
  if(!LANG)return;
  var tx=t();
  var cv=document.getElementById('city').value.trim();
  var ds=document.getElementById('date').value;
  if(!cv&&!gLat)return;
  if(!ds){ds=dateStr();document.getElementById('date').value=ds;}
  document.getElementById('sts').textContent=tx.calculating;
  document.getElementById('out').innerHTML='';
  var lat,lon,tzN,cN;
  function resCity(){
    var cd=findCity(cv);
    if(cd){lat=cd.lat;lon=cd.lon;tzN=cd.tz;cN=cv;return Promise.resolve();}
    if(gLat){lat=gLat;lon=gLon;tzN=guessTz(lat,lon);cN=cv;return Promise.resolve();}
    return fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(cv)+'&format=json&limit=1')
      .then(function(r){return r.json();})
      .then(function(d){if(!d||!d.length)throw new Error(cv+' not found');lat=+d[0].lat;lon=+d[0].lon;tzN=guessTz(lat,lon);cN=cv;});
  }
  var cP=cv?resCity():Promise.resolve();
  if(!cv){lat=gLat;lon=gLon;tzN=guessTz(lat,lon);cN=LANG==='hi'?'\u0906\u092A\u0915\u093E \u0938\u094D\u0925\u093E\u0928':'Your Location';}
  cP.then(function(){
    var tz=getTZOff(tzN,ds);
    var cd=cityDateStr(tz);
    if(!uDate&&cd!==ds){ds=cd;document.getElementById('date').value=ds;}
    var now=new Date(),nc=((now.getUTCHours()*60+now.getUTCMinutes()+tz*60)%1440+1440)%1440;
    var nd=new Date(ds+'T12:00:00Z');nd.setUTCDate(nd.getUTCDate()+1);
    var pd=new Date(ds+'T12:00:00Z');pd.setUTCDate(pd.getUTCDate()-1);
    var nds=nd.toISOString().split('T')[0],pds=pd.toISOString().split('T')[0];
    return Promise.all([getSun(lat,lon,ds,tz),getSun(lat,lon,nds,tz),getSun(lat,lon,pds,tz)]).then(function(ss){
      var sun=ss[0],sun2=ss[1],sunP=ss[2];
      var iBSR=nc<sun.sr;
      var wd=new Date(ds+'T12:00:00Z').getUTCDay();
      var dSeq=getDSeq(wd),nSeq=getNightSeq(dSeq);
      var dSeg=div(sun.sr,sun.ss),nSeg=div(sun.ss,sun2.sr+1440);
      var rahu=getPd(sun.sr,sun.ss,RI[wd]),yama=getPd(sun.sr,sun.ss,YI[wd]);
      var kv=getPd(sun.sr,sun.ss,KVI[wd]),vv=getPd(sun.sr,sun.ss,VVI[wd]),kr=nSeg[KRI[wd]];
      var isTdy=(ds===cd),tzSg=tz>=0?'+':'';
      var ft='';
      var yr=new Date(ds+'T12:00:00Z').getFullYear();
      if(FESTS[yr])FESTS[yr].forEach(function(f){if(f[0]===ds)ft+=(ft?' | ':'')+getFN(f);});
      var dn=cap(getDN(cN));
      var dName=new Date(ds+'T12:00:00Z').toLocaleDateString(tx.locale,{weekday:'long'});
      var lun=getLunar(ds,sun.sr,sun.ss,tz);
      var p=lun.p,s=lun.s;
      var pk1=p<=15?'Shu.':'Kr.',td1=p<=15?p:p-15;
      var pN=tx.tithiNames[p-1];
      var lM=LANG==='hi'?lun.mHI:lun.mEN;

      var h='<h3>'+dn+'</h3>';
      h+='<div style="color:#555;font-size:15px">'+tzN+' (UTC'+tzSg+tz+'h)</div>';
      var dl='<b>'+ds+'</b> &nbsp; <b>'+dName+'</b>';
      if(ft)dl+=' &nbsp;|&nbsp; <span style="font-weight:900;color:green">'+ft+'</span>';
      h+='<div style="font-size:18px;color:#111;margin:6px 0">'+dl+'</div>';
      h+='<div style="font-size:17px;color:#6b3fa0;font-weight:900;margin:2px 0">';
      h+=lM+' &nbsp; '+pN+' ('+pk1+td1+')';
      if(lun.isAd)h+=' &nbsp;<span style="background:#ff8c00;color:#fff;border-radius:4px;padding:2px 7px;font-size:14px">Adhik</span>';
      h+='</div>';
      if(s){var pk2=s<=15?'Shu.':'Kr.',td2=s<=15?s:s-15,sN=tx.tithiNames[s-1];
        h+='<div style="font-size:14px;color:#888;margin:1px 0">';
        if(lun.s2m)h+='← '+sN+' ('+pk2+td2+') until '+lun.bt;
        else h+='→ '+tx.then+': '+sN+' ('+pk2+td2+') from '+lun.bt;
        h+='</div>';
      }
      h+=tx.sunrise+': <b>'+fmt(sun.sr)+'</b> &nbsp;|&nbsp; '+tx.sunset+': <b>'+fmt(sun.ss)+'</b><br>';
      var dd=sun.ss-sun.sr;
      h+='<div style="font-size:17px;font-weight:bold;margin:6px 0;color:#1a5c99">';
      h+=tx.navkarsi+': <b>'+fmt(sun.sr+48)+'</b> &nbsp;|&nbsp; '+tx.porsi+': <b>'+fmt(sun.sr+dd/4)+'</b></div>';
      h+='<small style="color:#888">'+tx.allTimes+' '+dn+' '+tx.localTime+'</small>';

      var best=[];
      dSeg.forEach(function(sg,i){var n=dSeq[i];if(!getGood().includes(n))return;if(qual(n,sg[0],rahu,yama,kv,vv,kr)===tx.qBest)best.push(n+': '+fmt(sg[0])+' - '+fmt(sg[1])+tx.bestSfx);});
      h+='<div class="box" style="border-color:green;background:#eaffea"><b>'+tx.bestTitle+'</b><br>'+(best.length?best.join('<br>'):tx.noBest)+'</div>';

      if(isTdy){
        var cur='',curQ='',curT='',curN='';
        if(iBSR){
          var pw=new Date(pds+'T12:00:00Z').getUTCDay();
          var pDS=getDSeq(pw),pNS=getNightSeq(pDS),pNSg=div(sunP.ss,sun.sr+1440);
          var pR=getPd(sunP.sr,sunP.ss,RI[pw]),pY=getPd(sunP.sr,sunP.ss,YI[pw]);
          var pKV=getPd(sunP.sr,sunP.ss,KVI[pw]),pVV=getPd(sunP.sr,sunP.ss,VVI[pw]),pKR=pNSg[KRI[pw]];
          var nx=nc+1440;
          pNSg.forEach(function(sg,i){var ok=false;if(sg[0]>=1440&&nx>=sg[0]&&nx<sg[1])ok=true;else if(sg[0]<1440&&sg[1]>1440&&nx>=sg[0]&&nx<sg[1])ok=true;if(ok){cur=pNS[i];curQ=qual(cur,sg[0],pR,pY,pKV,pVV,pKR);curT=fmt(sg[0])+' - '+fmt(sg[1]);curN=tx.beforeSun+' '+pds;}});
        }else{
          dSeg.forEach(function(sg,i){if(nc>=sg[0]&&nc<sg[1]){cur=dSeq[i];curQ=qual(cur,sg[0],rahu,yama,kv,vv,kr);curT=fmt(sg[0])+' - '+fmt(sg[1]);}});
          if(!cur)nSeg.forEach(function(sg,i){if(sg[0]<1440&&nc>=sg[0]&&nc<Math.min(sg[1],1440)){cur=nSeq[i];curQ=qual(cur,sg[0],rahu,yama,kv,vv,kr);curT=fmt(sg[0])+' - '+fmt(sg[1]);}if(sg[0]<1440&&sg[1]>1440&&nc>=sg[0]){cur=nSeq[i];curQ=qual(cur,sg[0],rahu,yama,kv,vv,kr);curT=fmt(sg[0])+' - '+fmt(sg[1]);}});
        }
        h+='<div class="box" style="border-color:blue;background:#eef4ff"><b>'+tx.curTitle+' '+dn+'</b>';
        if(curN)h+='<br><small style="color:#888">'+curN+'</small>';
        h+='<br>'+(cur?cur+' &nbsp;'+curT+' &nbsp;'+bdg(curQ):tx.undetected)+'</div>';
      }
      h+='<div style="font-size:16px;margin:10px 0;line-height:2;padding:10px;background:#fff3f3;border-radius:8px;border:1px solid #ffcccc">';
      h+='<b style="color:red">'+tx.rahu+'</b> '+fmt(rahu[0])+'-'+fmt(rahu[1]);
      h+=' &nbsp; <b style="color:red">'+tx.yama+'</b> '+fmt(yama[0])+'-'+fmt(yama[1]);
      h+=' &nbsp; <b style="color:red">'+tx.kv+'</b> '+fmt(kv[0])+'-'+fmt(kv[1]);
      h+=' &nbsp; <b style="color:red">'+tx.vv+'</b> '+fmt(vv[0])+'-'+fmt(vv[1]);
      h+=' &nbsp; <b style="color:red">'+tx.kr+'</b> '+fmt(kr[0])+'-'+fmt(kr[1])+'</div>';
      h+='<h3>'+tx.dayChog+'</h3><table><tr><th>#</th><th>'+tx.tTime+'</th><th>'+tx.tName+'</th><th>'+tx.tQual+'</th></tr>';
      dSeg.forEach(function(sg,i){var q=qual(dSeq[i],sg[0],rahu,yama,kv,vv,kr);var nw=isTdy&&!iBSR&&nc>=sg[0]&&nc<sg[1];h+='<tr'+(nw?' style="background:#fffde7;font-weight:bold"':'')+'>';h+='<td>'+(i+1)+'</td><td>'+fmt(sg[0])+'\u2013'+fmt(sg[1])+'</td><td>'+dSeq[i]+(nw?tx.now:'')+'</td><td>'+bdg(q)+'</td></tr>';});
      h+='</table><h3>'+tx.nightChog+'</h3><table><tr><th>#</th><th>'+tx.tTime+'</th><th>'+tx.tName+'</th><th>'+tx.tQual+'</th></tr>';
      nSeg.forEach(function(sg,i){var q=qual(nSeq[i],sg[0],rahu,yama,kv,vv,kr);var nw=isTdy&&!iBSR&&sg[0]<1440&&nc>=sg[0]&&nc<Math.min(sg[1],1440);h+='<tr'+(nw?' style="background:#fffde7;font-weight:bold"':'')+'>';h+='<td>'+(i+1)+'</td><td>'+fmt(sg[0])+'\u2013'+fmt(sg[1])+'</td><td>'+nSeq[i]+(nw?tx.now:'')+'</td><td>'+bdg(q)+'</td></tr>';});
      h+='</table>';
      document.getElementById('out').innerHTML=h;
      document.getElementById('sts').textContent=dn+' | '+tzN+' (UTC'+tzSg+tz+'h)';
    });
  }).catch(function(e){document.getElementById('sts').textContent=e.message;document.getElementById('out').innerHTML='<div style="color:red;padding:12px">'+e.message+'</div>';});
}

function toggleFest(){
  var fb=document.getElementById('fb');
  if(fb.style.display==='none'||fb.style.display===''){
    var tx=t(),yr=new Date().getFullYear(),fs=FESTS[yr]||[],td=dateStr();
    if(!fs.length){fb.innerHTML='<h3>'+tx.festTitle+'</h3><p style="padding:12px">'+tx.noFestData+' '+yr+'. '+tx.festNote+'</p>';fb.style.display='block';return;}
    var h='<h3>'+tx.festTitle+' '+yr+'</h3>';
    h+='<table class="ft"><tr><th>'+( LANG==='hi'?'\u0924\u093E\u0930\u0940\u0916':'Date')+'</th><th>'+(LANG==='hi'?'\u092A\u0930\u094D\u0935':'Festival')+'</th></tr>';
    var lm='';
    fs.forEach(function(f){
      var mo=f[0].substring(5,7);
      if(mo!==lm){h+='<tr class="fm"><td colspan="2">'+tx.months[parseInt(mo)-1]+' '+yr+'</td></tr>';lm=mo;}
      var dd=new Date(f[0]+'T12:00:00Z'),lbl=tx.days[dd.getUTCDay()]+', '+dd.getUTCDate()+' '+tx.months[dd.getUTCMonth()];
      var it=f[0]===td;
      h+='<tr class="'+(it?'ftoday':'')+'"><td>'+lbl+(it?tx.today:'')+'</td><td class="fn">'+getFN(f)+'</td></tr>';
    });
    h+='</table>';fb.innerHTML=h;fb.style.display='block';
  }else fb.style.display='none';
}

// ── Init ──────────────────────────────────────────────────
var gLat=null,gLon=null,_done=false;
function _def(){if(_done)return;_done=true;gLat=13.0827;gLon=80.2707;var c=LANG==='hi'?'\u091A\u0947\u0928\u094D\u0928\u0908':'Chennai';document.getElementById('city').value=c;document.getElementById('sts').textContent=t().defCity;calculate();}
function _ip(){if(_done)return;fetch('https://ipapi.co/json/').then(function(r){return r.json();}).then(function(d){if(_done)return;_done=true;gLat=d.latitude;gLon=d.longitude;var c=d.city||'Chennai';var dc=LANG==='hi'?(HC[c.toLowerCase()]||c):cap(c);document.getElementById('city').value=dc;document.getElementById('sts').textContent=t().ipLoc+dc;calculate();}).catch(function(){_def();});}
function initApp(){
  document.getElementById('date').value=dateStr();
  applyLang();_done=false;
  var fb=setTimeout(function(){_def();},6000);
  if(!navigator.geolocation){clearTimeout(fb);_ip();return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){clearTimeout(fb);if(_done)return;_done=true;gLat=pos.coords.latitude;gLon=pos.coords.longitude;var best='',bd=999;for(var k in CI){var c=CI[k],d=Math.abs(c.lat-gLat)+Math.abs(c.lon-gLon);if(d<bd){bd=d;best=k;}}var cn=bd<2?best:'';var dn=LANG==='hi'?(HC[cn]||cn||''):cap(cn);document.getElementById('city').value=dn||cap(cn);document.getElementById('sts').textContent=t().detected+(dn||cap(cn));calculate();},
    function(){clearTimeout(fb);_ip();},
    {timeout:5000,maximumAge:300000}
  );
}
window.addEventListener('load',function(){
  if(LANG){document.getElementById('langScreen').style.display='none';document.getElementById('app').style.display='block';initApp();}
});
try{if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');}catch(e){}
</script>
