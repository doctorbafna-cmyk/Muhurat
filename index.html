<!DOCTYPE html>
<html>

<head>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<title>Universal Muhurat Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
font-size:18px;
max-width:720px;
margin:auto;
padding:10px;
background:#fafafa;
}
h2{text-align:center;}
input,button{
padding:12px;
margin:6px 0;
width:100%;
font-size:17px;
border-radius:6px;
border:1px solid #ccc;
}
button{
background:#ff8c00;
color:white;
font-weight:bold;
border:none;
}
table{
border-collapse:collapse;
width:100%;
margin-top:15px;
background:white;
}
th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}
th{background:#f0f0f0;}

.green{color:green;font-weight:bold;}
.red{color:red;font-weight:bold;}

.bestBox{
margin-top:15px;
padding:12px;
border:2px solid green;
background:#eaffea;
}

.currentBox{
margin-top:15px;
padding:12px;
border:2px solid blue;
background:#eef4ff;
}
</style>
</head>

<body>

<h2>Universal Muhurat Calculator</h2>

<input id="city" placeholder="Enter City Name">
<input id="date" type="date">

<button onclick="calculate()">Calculate</button>
<button onclick="toggleFestivals()">Show / Hide Festival Calendar</button>

<div id="festivalBox" style="display:none;"></div>
<div id="output"></div>

<script>

/* AUTO DATE */
let d=new Date();
document.getElementById("date").value=d.toISOString().split("T")[0];

/* FESTIVALS */
const festivals={
"2026-01-14":"Makar Sankranti",
"2026-03-04":"Holi",
"2026-03-20":"Ugadi / Navratri",
"2026-03-27":"Rama Navami",
"2026-03-31":"Mahavir Jayanti",
"2026-04-14":"Tamil New Year",
"2026-04-20":"Akshay Tritiya",
"2026-08-15":"Independence Day",
"2026-08-28":"Raksha Bandhan",
"2026-09-08":"Paryushan Prarmbh",
"2026-09-14":"Ganesh Chaturthi",
"2026-09-15":"Samvatsari",
"2026-10-11":"Navratri",
"2026-10-20":"Dussehra",
"2026-11-06":"Dhan Teras",
"2026-11-08":"Deepavali",
"2026-12-25":"Christmas"
};


function toggleFestivals(){
let box=document.getElementById("festivalBox");
if(box.style.display==="none"){
let html="<h3>Festival Calendar</h3><table><tr><th>Date</th><th>Festival</th></tr>";
Object.keys(festivals).forEach(d=>{
html+=`<tr><td>${d}</td><td>${festivals[d]}</td></tr>`;
});
html+="</table>";
box.innerHTML=html;
box.style.display="block";
}else box.style.display="none";
}

/* GEO */
async function geocode(city){
let r=await fetch(`https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1`);
let d=await r.json();
return {lat:d[0].lat,lon:d[0].lon,display:d[0].display_name};
}

/* SUN */
async function getSun(lat,lon,date){
let r=await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&date=${date}&formatted=0`);
let d=await r.json();
let sr=new Date(d.results.sunrise);
let ss=new Date(d.results.sunset);
return {sunrise:sr.getHours()*60+sr.getMinutes(), sunset:ss.getHours()*60+ss.getMinutes()};
}

function format(m){
let h=Math.floor(m/60)%24;
let mm=Math.round(m%60);
return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}

function divide(s,e){
let p=(e-s)/8;
let a=[];
for(let i=0;i<8;i++) a.push([s+i*p,s+(i+1)*p]);
return a;
}

function inP(t,s,e){return t>=s&&t<e;}

/* CHOGHADIYA */
const cycle=["Amrit","Char","Rog","Kaal","Labh","Udveg","Shubh"];
const dayNames={
0:["Udveg","Char","Labh","Amrit","Kaal","Shubh","Rog","Udveg"],
1:["Amrit","Kaal","Shubh","Rog","Udveg","Char","Labh","Amrit"],
2:["Rog","Udveg","Char","Labh","Amrit","Kaal","Shubh","Rog"],
3:["Labh","Amrit","Kaal","Shubh","Rog","Udveg","Char","Labh"],
4:["Shubh","Rog","Udveg","Char","Labh","Amrit","Kaal","Shubh"],
5:["Char","Labh","Amrit","Kaal","Shubh","Rog","Udveg","Char"],
6:["Kaal","Shubh","Rog","Udveg","Char","Labh","Amrit","Kaal"]
};

function nightFromDay(d){
let idx=(cycle.indexOf(d[7])+1)%7;
let n=[];
for(let i=0;i<8;i++) n.push(cycle[(idx+i)%7]);
return n;
}

/* DOSHAS */
const rahuIndex=[7,1,6,4,5,3,2];
const yamaIndex=[4,3,2,1,0,6,5];
const kaalVelaIndex={0:4,1:1,2:5,3:2,4:6,5:3,6:0};
const vaarVelaIndex={0:3,1:6,2:1,3:4,4:7,5:2,6:5};
const kaalRatriIndex={0:5,1:3,2:1,3:6,4:4,5:2,6:0};

function period(s,e,i){
let p=(e-s)/8;
return [s+p*i,s+p*(i+1)];
}

/* QUALITY */
function quality(name,start,rahu,yama,kv,vv,kr){

// 🔴 CHECK DOSHAS FIRST (OVERRIDE)
if(inP(start,rahu[0],rahu[1])) return "RAHU";
if(inP(start,yama[0],yama[1])) return "YAMA";
if(inP(start,kv[0],kv[1])) return "Kaal Vela";
if(inP(start,vv[0],vv[1])) return "Vaar Vela";
if(inP(start,kr[0],kr[1])) return "Kaal Ratri";

// 🟢 NORMAL CHOGHADIYA
if(name==="Amrit" || name==="Shubh" || name==="Labh") return "BEST";
if(name==="Char") return "GOOD";

return "Inauspicious";
}

/* MAIN */
async function calculate(){

let city=document.getElementById("city").value;
let date=document.getElementById("date").value;
if(!city){alert("Enter city");return;}

let loc=await geocode(city);
let sun=await getSun(loc.lat,loc.lon,date);

let next=new Date(date); next.setDate(next.getDate()+1);
let sun2=await getSun(loc.lat,loc.lon,next.toISOString().split("T")[0]);

let daySeg=divide(sun.sunrise,sun.sunset);
let nightSeg=divide(sun.sunset,sun2.sunrise+1440);

let wd=new Date(date).getDay();
let daySeq=dayNames[wd];
let nightSeq=nightFromDay(daySeq);

let rahu=period(sun.sunrise,sun.sunset,rahuIndex[wd]);
let yama=period(sun.sunrise,sun.sunset,yamaIndex[wd]);
let kv=period(sun.sunrise,sun.sunset,kaalVelaIndex[wd]);
let vv=period(sun.sunrise,sun.sunset,vaarVelaIndex[wd]);
let kr=nightSeg[kaalRatriIndex[wd]];

let html=`<h3>${loc.display}</h3>`;
html+=`<div style="font-size:20px;font-weight:bold;">
${date} (${new Date(date).toLocaleDateString('en-IN',{weekday:'long'})})
</div>`;
if(festivals[date]) html+=`<b>${festivals[date]}</b><br>`;
html+=`Sunrise ${format(sun.sunrise)} | Sunset ${format(sun.sunset)}<br>`;
html+=`Rahu ${format(rahu[0])}-${format(rahu[1])} |
Yama ${format(yama[0])}-${format(yama[1])} |
Kaal Vela ${format(kv[0])}-${format(kv[1])} |
Vaar Vela ${format(vv[0])}-${format(vv[1])} |
Kaal Ratri ${format(kr[0])}-${format(kr[1])}`;

/* BEST */
let best=[];
daySeg.forEach((s,i)=>{
let q=quality(daySeq[i],s[0],rahu,yama,kv,vv,kr);
if(q.includes("BEST")){
best.push(`<span class="green">${daySeq[i]} ${format(s[0])}-${format(s[1])}</span>`);
}
});
html+=`<div class="bestBox"><b>Best Muhurat</b><br>${best.join("<br>")}</div>`;

/* CURRENT */
let now=new Date();
let t=now.getHours()*60+now.getMinutes();

let cur="";
let curQuality="";
let curTime="";

// DAY
daySeg.forEach((s,i)=>{
if(t>=s[0] && t<s[1]){
cur = daySeq[i];
curTime = `${format(s[0])}-${format(s[1])}`;
curQuality = quality(daySeq[i],s[0],rahu,yama,kv,vv,kr)
}
});

// NIGHT
if(cur===""){
nightSeg.forEach((s,i)=>{
if(t>=s[0] && t<s[1]){
cur = nightSeq[i];
curTime = `${format(s[0])}-${format(s[1])}`;
curQuality = quality(nightSeq[i],s[0],rahu,yama,kv,vv,kr)
});
}

let color = (curQuality==="BEST") ? "green" : (curQuality==="GOOD" ? "orange" : "red");

html+=`<div class="box" style="border-color:blue;background:#eef4ff">
<b>Current Muhurat</b><br>
${cur} ${curTime} (<span style="color:${color};font-weight:bold">${curQuality}</span>)
</div>`;

/* DAY TABLE */
html+="<h3>Day Choghadiya</h3>";
html+="<table><tr><th>#</th><th>Time</th><th>Name</th><th>Quality</th></tr>";
daySeg.forEach((s,i)=>{
html+=`<tr><td>${i+1}</td><td>${format(s[0])}-${format(s[1])}</td><td>${daySeq[i]}</td><td>${quality(daySeq[i],s[0],rahu,yama,kv,vv,kr)}</td></tr>`;
});
html+="</table>";

/* NIGHT TABLE */
html+="<h3>Night Choghadiya</h3>";
html+="<table><tr><th>#</th><th>Time</th><th>Name</th><th>Quality</th></tr>";
nightSeg.forEach((s,i)=>{
html+=`<tr><td>${i+1}</td><td>${format(s[0])}-${format(s[1])}</td><td>${nightSeq[i]}</td><td>${quality(nightSeq[i],s[0],rahu,yama,kv,vv,kr)}</td></tr>`;
});
html+="</table>";

document.getElementById("output").innerHTML=html;
}

/* AUTO CITY */
navigator.geolocation.getCurrentPosition(async pos=>{
let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let d=await r.json();
document.getElementById("city").value=d.address.city||d.address.town||d.address.state||"Chennai";
calculate();
});

</script>
</body>
</html>
