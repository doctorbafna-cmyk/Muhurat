// Set today in LOCAL time (not UTC — avoids date being wrong at midnight)
function getLocalDateStr(){
  let now = new Date();
  let y = now.getFullYear();
  let m = String(now.getMonth()+1).padStart(2,"0");
  let d = String(now.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+d;
}
document.getElementById("date").value = getLocalDateStr();

// Auto calculate on date change
document.getElementById("date").addEventListener("change", function(){
  calculate();
});

// Auto calculate on city typing
let autoTimer = null;
document.getElementById("city").addEventListener("input", function(){
  clearTimeout(autoTimer);
  let val = document.getElementById("city").value.trim();
  if(val.length >= 3) autoTimer = setTimeout(calculate, 1500);
});

// Format
function format(m){
  m=((m%1440)+1440)%1440;
  let h=Math.floor(m/60),mm=Math.round(m%60);
  let ampm=h<12?"AM":"PM",h12=h%12===0?12:h%12;
  return h12+":"+String(mm).padStart(2,"0")+" "+ampm;
}
function divide(s,e){let p=(e-s)/8,a=[];for(let i=0;i<8;i++)a.push([s+i*p,s+(i+1)*p]);return a;}
function inP(t,s,e){return t>=s&&t<e;}

function findCity(name){
  let k = name.trim().toLowerCase();
  if(CITIES[k]) return CITIES[k];
  // Partial match
  for(let key in CITIES){
    if(key.includes(k) || k.includes(key)) return CITIES[key];
  }
  return null;
}

// Get timezone offset including DST
function getOffset(tz, dateStr){
  try{
    let d = new Date(dateStr+"T12:00:00Z");
    let a = new Date(d.toLocaleString("en-US",{timeZone:tz}));
    let b = new Date(d.toLocaleString("en-US",{timeZone:"UTC"}));
    return (a-b)/3600000;
  }catch(e){return 5.5;}
}

// Sunrise/Sunset
async function getSun(lat,lon,date,tz){
  let r = await fetch("https://api.sunrise-sunset.org/json?lat="+lat+"&lng="+lon+"&date="+date+"&formatted=0");
  let d = await r.json();
  if(!d||d.status!=="OK") throw new Error("Cannot get sun times. Check internet.");
  function toLocal(u){return new Date(u).getUTCHours()*60+new Date(u).getUTCMinutes()+tz*60;}
  return{sunrise:toLocal(d.results.sunrise),sunset:toLocal(d.results.sunset)};
}

// Choghadiya
const cycle=["Amrit","Char","Rog","Kaal","Labh","Udveg","Shubh"];
const daySeqs={
  0:["Udveg","Char","Labh","Amrit","Kaal","Shubh","Rog","Udveg"],
  1:["Amrit","Kaal","Shubh","Rog","Udveg","Char","Labh","Amrit"],
  2:["Rog","Udveg","Char","Labh","Amrit","Kaal","Shubh","Rog"],
  3:["Labh","Amrit","Kaal","Shubh","Rog","Udveg","Char","Labh"],
  4:["Shubh","Rog","Udveg","Char","Labh","Amrit","Kaal","Shubh"],
  5:["Char","Labh","Amrit","Kaal","Shubh","Rog","Udveg","Char"],
  6:["Kaal","Shubh","Rog","Udveg","Char","Labh","Amrit","Kaal"]
};
function getNightSeq(d){let idx=(cycle.indexOf(d[7])+1)%7,n=[];for(let i=0;i<8;i++)n.push(cycle[(idx+i)%7]);return n;}
const rahuIdx=[7,1,6,4,5,3,2];
const yamaIdx=[4,3,2,1,0,6,5];
const kvIdx={0:4,1:1,2:5,3:2,4:6,5:3,6:0};
const vvIdx={0:3,1:6,2:1,3:4,4:7,5:2,6:5};
const krIdx={0:5,1:3,2:1,3:6,4:4,5:2,6:0};
function getPd(sr,ss,i){let p=(ss-sr)/8;return[sr+p*i,sr+p*(i+1)];}
function quality(n,s,rahu,yama,kv,vv,kr){
  if(inP(s,rahu[0],rahu[1]))return"RAHU";
  if(inP(s,yama[0],yama[1]))return"YAMA";
  if(inP(s,kv[0],kv[1]))return"Kaal Vela";
  if(inP(s,vv[0],vv[1]))return"Vaar Vela";
  if(inP(s,kr[0],kr[1]))return"Kaal Ratri";
  if(["Amrit","Shubh","Labh"].includes(n))return"BEST";
  if(n==="Char")return"GOOD";
  return"Inauspicious";
}
function badge(q){
  if(q==="BEST")      return'<span style="color:green;font-weight:bold">BEST</span>';
  if(q==="GOOD")      return'<span style="color:orange;font-weight:bold">GOOD</span>';
  if(q==="RAHU")      return'<span style="color:red;font-weight:bold">RAHU</span>';
  if(q==="YAMA")      return'<span style="color:red;font-weight:bold">YAMA</span>';
  if(q==="Kaal Vela") return'<span style="color:red;font-weight:bold">Kaal Vela</span>';
  if(q==="Vaar Vela") return'<span style="color:red;font-weight:bold">Vaar Vela</span>';
  if(q==="Kaal Ratri")return'<span style="color:red;font-weight:bold">Kaal Ratri</span>';
  return'<span style="color:red;font-weight:bold">'+q+'</span>';
}

// MAIN CALCULATE
async function calculate(){
  let cityVal = document.getElementById("city").value.trim();
  let date    = document.getElementById("date").value;

  // Wait silently if nothing available yet
  if(!cityVal && !gpsLat) return;
  if(!date){
    date = getLocalDateStr();
    document.getElementById("date").value = date;
  }

  document.getElementById("status").textContent = "Calculating...";
  document.getElementById("output").innerHTML   = "";

  try{
    let lat, lon, tzName, cityName;

    if(gpsLat && !cityVal){
      // Use GPS directly
      lat = gpsLat; lon = gpsLon; cityName = "Your Location";
      // Guess timezone from GPS coords
      tzName = guessTzFromCoords(gpsLat, gpsLon);
    } else {
      // Look up city in built-in database
      let cityKey = cityVal.toLowerCase().trim();
      let cityData = findCity(cityKey);

      if(cityData){
        lat = cityData.lat; lon = cityData.lon;
        tzName = cityData.tz; cityName = cityVal;
      } else if(gpsLat){
        // City not in database — use GPS coords
        lat = gpsLat; lon = gpsLon; cityName = cityVal;
        tzName = guessTzFromCoords(gpsLat, gpsLon);
        document.getElementById("status").textContent = "⚠️ '"+cityVal+"' not in database — using your GPS location";
      } else {
        // Try geocoding as last resort
        try{
          let r = await fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(cityVal)+"&format=json&limit=1");
          let d = await r.json();
          if(!d||d.length===0) throw new Error("City '"+cityVal+"' not found. Try a major city name.");
          lat = +d[0].lat; lon = +d[0].lon; cityName = cityVal;
          tzName = guessTzFromCoords(lat, lon);
        }catch(e){
          throw new Error("City '"+cityVal+"' not found. Please try: Mumbai, Delhi, London, Dubai etc.");
        }
      }
    }

    let tz = getOffset(tzName, date);
    let sun  = await getSun(lat, lon, date, tz);
    let next = new Date(date+"T12:00:00Z");
    next.setUTCDate(next.getUTCDate()+1);
    let sun2 = await getSun(lat, lon, next.toISOString().split("T")[0], tz);

    // Also get PREVIOUS day sun times — needed for current muhurat when before sunrise
    let prev = new Date(date+"T12:00:00Z");
    prev.setUTCDate(prev.getUTCDate()-1);
    let prevDateStr = prev.toISOString().split("T")[0];
    let sunPrev = await getSun(lat, lon, prevDateStr, tz);

    let nowUTC  = new Date();
    let nowCity = ((nowUTC.getUTCHours()*60+nowUTC.getUTCMinutes()+tz*60)%1440+1440)%1440;
    let wd      = new Date(date+"T12:00:00Z").getUTCDay();
    let daySeq  = daySeqs[wd];
    let nightSeq= getNightSeq(daySeq);
    let daySeg  = divide(sun.sunrise, sun.sunset);
    let nightSeg= divide(sun.sunset, sun2.sunrise+1440);
    let rahu=getPd(sun.sunrise,sun.sunset,rahuIdx[wd]);
    let yama=getPd(sun.sunrise,sun.sunset,yamaIdx[wd]);
    let kv=getPd(sun.sunrise,sun.sunset,kvIdx[wd]);
    let vv=getPd(sun.sunrise,sun.sunset,vvIdx[wd]);
    let kr=nightSeg[krIdx[wd]];
    // Current time in city
    let nowUTCtmp  = new Date();
    let nowCityTmp = ((nowUTCtmp.getUTCHours()*60+nowUTCtmp.getUTCMinutes()+tz*60)%1440+1440)%1440;

    // isBeforeSunrise: current time is after midnight but before sunrise
    // e.g. 2 AM, 6:35 AM — still in PREVIOUS night
    let isBeforeSunrise = nowCityTmp < sun.sunrise;

    // todayStr = actual calendar date right now in city
    let todayStr = getLocalDateStr();
    let yesterdayStr = (function(){
      let d=new Date(); d.setDate(d.getDate()-1);
      let y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");
      return y+"-"+m+"-"+dd;
    })();

    // isToday = user is viewing today's date
    let isToday = date===todayStr;

    // Show Current Muhurat box when:
    // Case 1: User viewing today + time is AFTER sunrise (daytime or evening)
    // Case 2: User viewing today + time is BEFORE sunrise (after midnight)
    //         → show yesterday's night segments
    // Case 3: User viewing yesterday + time is BEFORE sunrise
    //         → same as Case 2
    // In ALL cases when viewing today, show the box!
    let isCurrentPeriod = (date===todayStr) || (date===yesterdayStr && isBeforeSunrise);

    let tzSign  = tz>=0?"+":"";

    // Festival of the day
    let festToday="";
    let yr=new Date(date+"T12:00:00Z").getFullYear();
    if(MY_FESTIVALS[yr]){
      MY_FESTIVALS[yr].forEach(([fd,fn])=>{if(fd===date)festToday+=(festToday?" | ":"")+fn;});
    }

    // Output
    let dayName = new Date(date+"T12:00:00Z").toLocaleDateString("en-IN",{weekday:"long"});
    let html="<h3>"+cityName+"</h3>";
    html+="<div style='color:#555;font-size:15px'>"+tzName+" (UTC"+tzSign+tz+"h)</div>";
    // Date + Day + Festival all on ONE line
    let dateLine = "<b>"+date+"</b> &nbsp; <b>"+dayName+"</b>";
    if(festToday) dateLine += " &nbsp;|&nbsp; <span style='font-weight:900;color:green'>"+festToday+"</span>";
    html+="<div style='font-size:18px;color:#111;margin:6px 0'>"+dateLine+"</div>";
    html+="Sunrise: <b>"+format(sun.sunrise)+"</b> &nbsp;|&nbsp; Sunset: <b>"+format(sun.sunset)+"</b><br>";
    html+="<div style='font-size:15px;margin:6px 0;line-height:2'>";
    html+="<span style='color:red;font-weight:bold'>Rahu</span> "+format(rahu[0])+"-"+format(rahu[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>Yama</span> "+format(yama[0])+"-"+format(yama[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>KV</span> "+format(kv[0])+"-"+format(kv[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>VV</span> "+format(vv[0])+"-"+format(vv[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>KR</span> "+format(kr[0])+"-"+format(kr[1]);
    html+="</div>";
    html+="<small style='color:#888'>All times in "+cityName+" local time</small>";

    let best=[];
    daySeg.forEach((s,i)=>{
      let n=daySeq[i];
      if(!["Amrit","Shubh","Labh"].includes(n))return;
      if(quality(n,s[0],rahu,yama,kv,vv,kr)==="BEST")best.push(n+": "+format(s[0])+" – "+format(s[1]));
    });
    html+='<div class="box" style="border-color:green;background:#eaffea"><b>⭐ Best Muhurat</b><br>'+(best.length?best.join("<br>"):"None today")+"</div>";

    // Show current muhurat when viewing today or yesterday (before sunrise)
    if(isCurrentPeriod){
      let cur="",curQ="",curTime="";

      if(isBeforeSunrise){
        // BEFORE SUNRISE: we are in YESTERDAY's night Chowgadiya
        // Build yesterday's night segments: sunPrev.sunset → sun.sunrise
        let prevWd        = new Date(prevDateStr+"T12:00:00Z").getUTCDay();
        let prevDaySeq    = daySeqs[prevWd];
        let prevNSeq      = getNightSeq(prevDaySeq);
        let prevNSeg      = divide(sunPrev.sunset, sun.sunrise + 1440);
        let pRahu = getPd(sunPrev.sunrise,sunPrev.sunset,rahuIdx[prevWd]);
        let pYama = getPd(sunPrev.sunrise,sunPrev.sunset,yamaIdx[prevWd]);
        let pKv   = getPd(sunPrev.sunrise,sunPrev.sunset,kvIdx[prevWd]);
        let pVv   = getPd(sunPrev.sunrise,sunPrev.sunset,vvIdx[prevWd]);
        let pKr   = prevNSeg[krIdx[prevWd]];
        // Add 1440 to nowCity so it matches extended segment times past midnight
        let nowExt = nowCity + 1440;
        prevNSeg.forEach((s,i)=>{
          if(s[0]>=1440 && nowExt>=s[0] && nowExt<s[1]){
            cur     = prevNSeq[i];
            curQ    = quality(cur,s[0],pRahu,pYama,pKv,pVv,pKr);
            curTime = format(s[0])+" - "+format(s[1]);
          }
        });
        html+='<div class="box" style="border-color:blue;background:#eef4ff">';
        html+="<b>Current Muhurat in "+cityName+"</b>";
        html+="<br><small style='color:#888'>Before sunrise — last night ("+prevDateStr+")</small><br>";
        html+=(cur?cur+" &nbsp;"+curTime+" &nbsp;"+badge(curQ):"Unable to detect");
        html+="</div>";

      } else {
        // NORMAL: daytime or evening — use today's segments
        daySeg.forEach((s,i)=>{
          if(nowCity>=s[0] && nowCity<s[1]){
            cur=daySeq[i]; curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);
            curTime=format(s[0])+" - "+format(s[1]);
          }
        });
        if(!cur){
          nightSeg.forEach((s,i)=>{
            if(s[0]<1440 && nowCity>=s[0] && nowCity<Math.min(s[1],1440)){
              cur=nightSeq[i]; curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);
              curTime=format(s[0])+" - "+format(s[1]);
            }
            if(s[0]<1440 && s[1]>1440 && nowCity>=s[0]){
              cur=nightSeq[i]; curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);
              curTime=format(s[0])+" - "+format(s[1]);
            }
          });
        }
        html+='<div class="box" style="border-color:blue;background:#eef4ff">';
        html+="<b>Current Muhurat in "+cityName+"</b><br>";
        html+=(cur?cur+" &nbsp;"+curTime+" &nbsp;"+badge(curQ):"Unable to detect");
        html+="</div>";
      }
    }

    html+="<h3>Day Choghadiya</h3><table><tr><th>#</th><th>Time</th><th>Name</th><th>Quality</th></tr>";
    daySeg.forEach((s,i)=>{
      let q=quality(daySeq[i],s[0],rahu,yama,kv,vv,kr);
      let now=isCurrentPeriod&&!isBeforeSunrise&&nowCity>=s[0]&&nowCity<s[1];
      html+="<tr"+(now?' style="background:#fffde7;font-weight:bold"':"")+">"+"<td>"+(i+1)+"</td><td>"+format(s[0])+"–"+format(s[1])+"</td><td>"+daySeq[i]+(now?" ◀":"")+"</td><td>"+badge(q)+"</td></tr>";
    });
    html+="</table>";

    html+="<h3>Night Choghadiya</h3><table><tr><th>#</th><th>Time</th><th>Name</th><th>Quality</th></tr>";
    nightSeg.forEach((s,i)=>{
      let q=quality(nightSeq[i],s[0],rahu,yama,kv,vv,kr);
      let now=false;
      // Only highlight night row if it is evening (after sunset) not before sunrise
      // Before sunrise case is handled by yesterday's segments shown in Current Muhurat box
      if(isCurrentPeriod && !isBeforeSunrise){
        if(s[0]<1440&&nowCity>=s[0]&&nowCity<Math.min(s[1],1440))now=true;
        if(s[0]<1440&&s[1]>1440&&nowCity>=s[0])now=true;
      }
      html+="<tr"+(now?' style="background:#fffde7;font-weight:bold"':"")+">"+"<td>"+(i+1)+"</td><td>"+format(s[0])+"–"+format(s[1])+"</td><td>"+nightSeq[i]+(now?" ◀":"")+"</td><td>"+badge(q)+"</td></tr>";
    });
    html+="</table>";

    document.getElementById("output").innerHTML = html;
    document.getElementById("status").textContent = ""+cityName+" | "+tzName+" (UTC"+tzSign+tz+"h)";

  }catch(err){
    document.getElementById("status").textContent = "❌ "+err.message;
    document.getElementById("output").innerHTML = '<div style="color:red;padding:12px">⚠️ '+err.message+'</div>';
    console.error(err);
  }
}

// Guess timezone from coordinates
function guessTzFromCoords(lat, lon){
  if(lon>=68&&lon<=98&&lat>=6&&lat<=38)  return "Asia/Kolkata";
  if(lon>=80&&lon<=89&&lat>=26&&lat<=31) return "Asia/Kathmandu";
  if(lon>=-10&&lon<=2&&lat>=49&&lat<=61) return "Europe/London";
  if(lon>=44&&lon<=60&&lat>=20&&lat<=40) return "Asia/Dubai";
  if(lon>=100&&lon<=145&&lat>=20&&lat<=50) return "Asia/Tokyo";
  if(lon>=103&&lon<=105&&lat>=1&&lat<=2)  return "Asia/Singapore";
  if(lon>=-80&&lon<=-65&&lat>=25&&lat<=50) return "America/New_York";
  if(lon>=-100&&lon<=-80&&lat>=25&&lat<=50) return "America/Chicago";
  if(lon>=-120&&lon<=-100&&lat>=25&&lat<=50) return "America/Denver";
  if(lon>=-130&&lon<=-120&&lat>=25&&lat<=50) return "America/Los_Angeles";
  return "UTC";
}

// Festival Calendar
const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_NAMES_F=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function toggleFestivals(){
  let box=document.getElementById("festBox");
  if(box.style.display==="none"){
    let today=getLocalDateStr();
    let year=new Date().getFullYear();
    let fests=MY_FESTIVALS[year]||[];
    if(fests.length===0){
      box.innerHTML="<h3>🪔 Festival Calendar</h3><p style='padding:12px'>No data for "+year+". Please update from Padmodaya calendar.</p>";
      box.style.display="block";return;
    }
    let html="<h3>Festival Calendar "+year+" — Jay Parshva Padmodaya</h3>";
    html+='<table class="ftable"><tr><th>Date</th><th>Festival</th></tr>';
    let lastMo="";
    fests.forEach(([fd,fn])=>{
      let mo=fd.substring(5,7);
      if(mo!==lastMo){html+='<tr class="fmonth"><td colspan="2">'+MONTH_NAMES[parseInt(mo)-1]+" "+year+"</td></tr>";lastMo=mo;}
      let d=new Date(fd+"T12:00:00Z");
      let label=DAY_NAMES_F[d.getUTCDay()]+", "+d.getUTCDate()+" "+MONTH_NAMES[d.getUTCMonth()].slice(0,3);
      let isToday=fd===today;
      html+='<tr class="'+(isToday?"ftoday":"")+'"><td>'+label+(isToday?" ⭐ TODAY":"")+'</td><td>'+fn+'</td></tr>';
    });
    html+='</table>';
    box.innerHTML=html;box.style.display="block";
  }else{box.style.display="none";}
}

// AUTO DETECT
window.addEventListener("load", function(){
  if(!navigator.geolocation){
    gpsLat=13.0827;gpsLon=80.2707;
    document.getElementById("city").value="Chennai";
    document.getElementById("status").textContent="Using default: Chennai";
    calculate();return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      gpsLat=pos.coords.latitude;gpsLon=pos.coords.longitude;
      // Find nearest city from database
      let bestCity="", bestDist=999;
      for(let k in CITIES){
        let c=CITIES[k];
        let dist=Math.abs(c.lat-gpsLat)+Math.abs(c.lon-gpsLon);
        if(dist<bestDist){bestDist=dist;bestCity=k;}
      }
      let cityName = bestDist<2 ? bestCity.charAt(0).toUpperCase()+bestCity.slice(1) : "Your Location";
      document.getElementById("city").value = cityName;
      document.getElementById("status").textContent = "Detected: "+cityName;
      calculate();
    },
    async function(){
      try{
        let r=await fetch("https://ipapi.co/json/");
        let d=await r.json();
        gpsLat=d.latitude;gpsLon=d.longitude;
        let city=d.city||"Chennai";
        document.getElementById("city").value=city;
        document.getElementById("status").textContent="IP Location: "+city;
        calculate();
      }catch(e){
        gpsLat=13.0827;gpsLon=80.2707;
        document.getElementById("city").value="Chennai";
        document.getElementById("status").textContent="Using default: Chennai";
        calculate();
      }
    }
  );
});
