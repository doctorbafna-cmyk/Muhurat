<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universal Muhurat Calculator</title>
<link rel="apple-touch-icon" href="https://i.ibb.co/tpY6PWKg/shubh-labh.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;font-size:18px;max-width:720px;margin:auto;padding:10px;background:#fafafa;}
h2{text-align:center;}
input,button{padding:12px;margin:6px 0;width:100%;font-size:17px;border-radius:6px;border:1px solid #ccc;}
button{background:#ff8c00;color:white;font-weight:bold;border:none;}
table{border-collapse:collapse;width:100%;margin-top:15px;background:white;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#f0f0f0;}
.best{color:green;font-weight:bold;}
.bad{color:red;font-weight:bold;}
</style>
</head>

<body>

<h2>Universal Muhurat Calculator</h2>

<input id="city" placeholder="Enter City Name">
<input id="date" type="date">

<button onclick="calculate()">Calculate</button>
<button onclick="toggleFestivals()">Show / Hide Festival Calendar</button>

<div id="festivalBox" style="display:none;"></div>
<div id="output"></div>

<script>

// AUTO DATE
let d=new Date()
let today=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")
document.getElementById("date").value=today

// FESTIVALS
const festivals={
"2026-03-04":"Holi",
"2026-03-20":"Ugadi / Navratri",
"2026-03-27":"Rama Navami",
"2026-11-08":"Diwali"
};

function toggleFestivals(){
let box=document.getElementById("festivalBox")
if(box.style.display==="none"){
let html="<h3>Festival Calendar</h3>"
Object.keys(festivals).forEach(d=>{
html+=d+" : "+festivals[d]+"<br>"
})
box.innerHTML=html
box.style.display="block"
}else{
box.style.display="none"
}
}

// GEO
async function geocode(city){
let res=await fetch(`https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1`)
let data=await res.json()
return{lat:data[0].lat,lon:data[0].lon}
}

// SUN
async function getSun(lat,lon,date){
let res=await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&date=${date}&formatted=0`)
let data=await res.json()
let s=new Date(data.results.sunrise)
let e=new Date(data.results.sunset)
return{
sunrise:s.getHours()*60+s.getMinutes(),
sunset:e.getHours()*60+e.getMinutes()
}
}

function format(m){
let h=Math.floor(m/60)
let min=Math.round(m%60)
if(min==60){h++;min=0}
return String(h).padStart(2,"0")+":"+String(min).padStart(2,"0")
}

async function calculate(){

let city=document.getElementById("city").value
let date=document.getElementById("date").value

let loc=await geocode(city)
let sun=await getSun(loc.lat,loc.lon,date)

let html=`<h3>${city}</h3>`
html+=`Sunrise: ${format(sun.sunrise)} | Sunset: ${format(sun.sunset)}`

if(festivals[date]){
html+=`<div style="color:green;font-weight:bold">${festivals[date]}</div>`
}

document.getElementById("output").innerHTML=html
}

// AUTO LOCATION
navigator.geolocation.getCurrentPosition(async pos=>{
let lat=pos.coords.latitude
let lon=pos.coords.longitude

let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
let data=await r.json()

let city=data.address.city||data.address.town||data.address.state||"Delhi"

document.getElementById("city").value=city

calculate()
})
, ()=>{
// If location blocked, still run with default city
document.getElementById("city").value="Chennai";
calculate();
}

</script>

</body>
</html>
