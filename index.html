.app-header h2{font-size:1rem;font-weight:900;}
.lang-switch{font-size:0.8rem;font-weight:700;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);color:#fff;padding:4px 10px;border-radius:20px;cursor:pointer;}
.app-body{max-width:720px;margin:0 auto;padding:10px;}
input,button{padding:12px;margin:6px 0;width:100%;font-size:17px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{background:#ff8c00;color:white;font-weight:bold;border:none;cursor:pointer;}
button:hover{background:#e07800;}
table{border-collapse:collapse;width:100%;margin-top:15px;background:white;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;font-size:16px;}
th{background:#f0f0f0;}
.box{margin-top:15px;padding:12px;border:2px solid;border-radius:6px;}
#status{font-size:14px;color:#666;text-align:center;padding:4px;}
#festBox{display:none;margin-top:12px;background:#fff;border:2px solid #ccc;border-radius:8px;overflow:hidden;}
#festBox h3{background:#ff8c00;color:#fff;margin:0;padding:12px 16px;font-size:1.1rem;}
.ftable{width:100%;border-collapse:collapse;}
.ftable th{background:#ffe0b2;padding:10px 14px;font-size:1.2rem;font-weight:900;text-align:center;border-bottom:2px solid #ccc;}
.ftable td{padding:10px 14px;font-size:1.05rem;font-weight:bold;border-bottom:1px solid #eee;color:#111;vertical-align:middle;text-align:center;}
.ftable tr:nth-child(even) td{background:#fff8f0;}
.fmonth td{background:#ff8c00!important;color:#fff!important;font-weight:900;font-size:1.1rem;}

function setLang(lang){
  LANG=lang; localStorage.setItem("muhurat_lang",lang);
  applyLang();
  document.getElementById("langScreen").style.display="none";
  document.getElementById("app").style.display="block";
  initApp();
}
function changeLang(){
  document.getElementById("langScreen").style.display="flex";
  document.getElementById("app").style.display="none";
}
function applyLang(){
  const t=T[LANG];
  document.getElementById("appTitle").textContent=t.appTitle;
  document.getElementById("city").placeholder=t.placeholder;
  document.getElementById("calcBtn").textContent=t.calcBtn;
  document.getElementById("festBtn").innerHTML=t.festBtn;
  document.getElementById("status").textContent=t.detecting;
}

function capitalize(str){
  if(!str)return str;
  return str.split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
}
function getPhoneDateStr(){
  const n=new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}
function getCityDateStr(tzOffset){
  const now=new Date(),cityMs=now.getTime()+tzOffset*3600000,cityDate=new Date(cityMs);
  return cityDate.getUTCFullYear()+"-"+String(cityDate.getUTCMonth()+1).padStart(2,"0")+"-"+String(cityDate.getUTCDate()).padStart(2,"0");
}
function format(m){
  m=((m%1440)+1440)%1440;
  const h=Math.floor(m/60),mm=Math.round(m%60),ampm=h<12?"AM":"PM",h12=h%12===0?12:h%12;
  return h12+":"+String(mm).padStart(2,"0")+" "+ampm;
}
function divide(s,e){const p=(e-s)/8,a=[];for(let i=0;i<8;i++)a.push([s+i*p,s+(i+1)*p]);return a;}
function inP(t,s,e){return t>=s&&t<e;}

// ══════════════════════════════════════════════════════════
//  JAIN / HINDU PURNIMANTA LUNAR CALENDAR  ← FULLY CORRECTED
//
//  Three bugs fixed vs previous version:
//  1. Month names: now uses Sun's rashi INGRESS during NM window
//     (Rashi 0 Aries enters → Chaitra; Rashi 1 Taurus → Vaishakha; etc.)
//     NOT the rashi the Sun is already sitting in at the NM.
//  2. Purnimanta Krishna paksha → belongs to the NEXT Amanta month.
//  3. Adhik Maas naming → uses PREVIOUS window's name (Adhik Jyeshtha
//     precedes Ashadha, so it takes Jyeshtha's name, not Ashadha's).
//  4. Ingress search extends 1 day past NM boundary to catch late ingresses.
// ══════════════════════════════════════════════════════════

const _LR = Math.PI / 180;

// Gregorian date → Julian Day Number (at midnight UTC = JD − 0.5)
function _jd(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25*(y+4716)) + Math.floor(30.6001*(m+1)) + d + B - 1524.5;
}

// Sidereal Sun longitude (degrees) using Lahiri ayanamsa
function _sunLon(jd) {
  const n = jd - 2451545.0;
  const L = ((280.46646 + 0.9856474*n) % 360 + 360) % 360;
  const g = ((357.52911 + 0.9856003*n) % 360 + 360) % 360;
  const C = (1.914602 - 0.004817*(n/36525))*Math.sin(g*_LR)
          + (0.019993 - 0.000101*(n/36525))*Math.sin(2*g*_LR);
  const ayan = 23.85 + 0.013958*(n/36525);
  return (((L + C) - ayan) % 360 + 360) % 360;
}

// Sidereal Moon longitude (degrees)
function _moonLon(jd) {
  const T = (jd - 2451545.0) / 36525.0;
  const Lm = ((218.3164477 + 481267.88123421*T) % 360 + 360) % 360;
  const Mm = ((134.9633964 + 477198.8676313 *T) % 360 + 360) % 360 * _LR;
  const D  = ((297.8501921 + 445267.1114034 *T) % 360 + 360) % 360 * _LR;
  const F  = ((93.2720950  + 483202.0175233 *T) % 360 + 360) % 360 * _LR;
  const Ms = ((357.52911   + 35999.05029    *T) % 360 + 360) % 360 * _LR;
  let ml = Lm + 6.289*Math.sin(Mm) - 1.274*Math.sin(2*D-Mm)
    + 0.658*Math.sin(2*D) - 0.186*Math.sin(Ms) - 0.059*Math.sin(2*D-2*Mm)
    - 0.057*Math.sin(2*D-Mm+Ms) + 0.053*Math.sin(2*D+Mm) + 0.046*Math.sin(2*D-Ms)
    + 0.041*Math.sin(Mm-Ms) - 0.035*Math.sin(D) - 0.031*Math.sin(Mm+Ms)
    - 0.015*Math.sin(2*F-2*D) + 0.011*Math.sin(2*D-2*Mm);
  const ayan = 23.85 + 0.013958*T;
  return ((ml - ayan) % 360 + 360) % 360;
}

// Moon–Sun elongation 0–360°
function _elong(jd) {
  return ((_moonLon(jd) - _sunLon(jd)) % 360 + 360) % 360;
}

// Sun Rashi 0=Aries … 11=Pisces
function _rashi(jd) {
  return Math.floor(_sunLon(jd) / 30) % 12;
}

// Find next new moon strictly after jdAfter (elongation wraps 360→0)
function _nextNM(jdAfter) {
  let jd = jdAfter;
  // Step away from any existing new moon
  const e0 = _elong(jd);
  if (e0 < 5 || e0 > 355) jd += 3;
  let prev = _elong(jd);
  for (let s = 0; s < 80; s++) {
    jd += 0.5;
    const cur = _elong(jd);
    if (prev > 330 && cur < 30) {
      // Bisect to find exact crossing
      let lo = jd - 0.5, hi = jd;
      for (let i = 0; i < 53; i++) {
        const mid = (lo + hi) / 2;
        (_elong(mid) > 180) ? (lo = mid) : (hi = mid);
      }
      return (lo + hi) / 2;
    }
    prev = cur;
  }
  return jdAfter + 29.53;
}

// Month names indexed by Rashi the Sun ENTERS during the lunar month:
//   Rashi 0 (Sun enters Aries)       → Chaitra
//   Rashi 1 (Sun enters Taurus)      → Vaishakha
//   Rashi 2 (Sun enters Gemini)      → Jyeshtha
//   Rashi 3 (Sun enters Cancer)      → Ashadha
//   ...
//   Rashi 11 (Sun enters Pisces)     → Phalguna
const _MEN = ["Chaitra","Vaishakha","Jyeshtha","Ashadha","Shravana","Bhadrapada",
               "Ashwin","Kartika","Margashirsha","Pausha","Magha","Phalguna"];
const _MHI = ["चैत्र","वैशाख","ज्येष्ठ","आषाढ़","श्रावण","भाद्रपद",
               "आश्विन","कार्तिक","मार्गशीर्ष","पौष","माघ","फाल्गुन"];

// Find the Rashi the Sun FIRST enters during [jdNM_start, jdNM_end + 1 day).
// Returns 0–11, or -1 if no Rashi crossing found (= Adhik Maas).
// We extend 1 day past jdNM_end to catch ingresses that occur just after the NM
// (e.g. Gemini ingress on Jun 14 when NM is Jun 15 — the ingress is 1 day
// before the NM but within the logical "month" window that ends there).
function _ingressRashi(jdNM_start, jdNM_end) {
  const r0 = _rashi(jdNM_start + 0.5); // rashi half a day after NM start
  const limit = jdNM_end + 1.0;        // extend 1 day past next NM
  for (let dt = 1.0; jdNM_start + dt <= limit; dt += 0.5) {
    const r = _rashi(jdNM_start + dt);
    if (r !== r0) return r;
  }
  return -1; // Adhik Maas — no solar ingress
}

// ── Main API ─────────────────────────────────────────────
// getLunarInfo(dateStr, sunriseMins, tzOffsetHours)
// Returns { tithiNum(1-30), isKrishna, isAdhik, monthEN, monthHI }
function getLunarInfo(dateStr, sunriseMins, tzOffset) {
  const [y, m, d] = dateStr.split("-").map(Number);
  // JD at the moment of sunrise
  const jd = _jd(y, m, d) - 0.5 + (sunriseMins / 60 - tzOffset) / 24;

  // Tithi: elongation ÷ 12°, 1–30
  const elong    = _elong(jd);
  const tithiNum = Math.min(Math.floor(elong / 12) + 1, 30);
  const isKrishna = tithiNum > 15;

  // ── Find the bounding new moons ──
  // Approximate days since last NM
  const approxDaysSinceNM = (elong / 360) * 29.53058;
  // Start searching ~2 days before the estimated last NM
  let jdNM = _nextNM(jd - approxDaysSinceNM - 2);
  // Make sure jdNM is indeed ≤ jd (it should be the most recent NM)
  let guard = 0;
  while (jdNM > jd && guard++ < 3) jdNM = _nextNM(jdNM - 33);

  const jdNM2 = _nextNM(jdNM  + 26); // next NM
  const jdNM3 = _nextNM(jdNM2 + 26); // NM after that
  const jdNM0 = _nextNM(jdNM  - 33); // NM before current window

  // Amanta month indices for three consecutive windows
  const idxCur  = _ingressRashi(jdNM,  jdNM2); // current window
  const idxNext = _ingressRashi(jdNM2, jdNM3); // next window
  const idxPrev = _ingressRashi(jdNM0, jdNM);  // previous window

  const isAdhik = (idxCur === -1);

  let monthIdx;

  if (isKrishna) {
    // ── Purnimanta rule: Krishna paksha belongs to the NEXT month ──
    if (idxNext === -1) {
      // Next window is also Adhik — use the one after
      const jdNM4 = _nextNM(jdNM3 + 26);
      const idxNN = _ingressRashi(jdNM3, jdNM4);
      monthIdx = idxNN >= 0 ? idxNN : 0;
    } else {
      monthIdx = idxNext;
    }
  } else {
    // ── Shukla paksha ──
    if (isAdhik) {
      // Adhik month takes the name of the PRECEDING regular month
      // (traditional rule: Adhik Jyeshtha comes before Ashadha,
      //  so it is named after Jyeshtha, not Ashadha)
      monthIdx = idxPrev >= 0 ? idxPrev : (idxNext >= 0 ? idxNext : 0);
    } else {
      monthIdx = idxCur;
    }
  }

  if (monthIdx < 0 || monthIdx > 11) monthIdx = 0;

  return {
    tithiNum,           // 1–30 (raw; tithiNames[tithiNum-1] gives correct name)
    isKrishna,
    isAdhik: isAdhik && !isKrishna,
    monthEN: (isAdhik && !isKrishna ? "Adhik " : "") + _MEN[monthIdx],
    monthHI: (isAdhik && !isKrishna ? "अधिक "  : "") + _MHI[monthIdx],
  };
}

async function calculate(){
  if(!LANG) return;
  const t=T[LANG];
  let cityVal=document.getElementById("city").value.trim();
  let date=document.getElementById("date").value;
  if(!cityVal && !gpsLat) return;
  if(!date){ date=getPhoneDateStr(); document.getElementById("date").value=date; }

  document.getElementById("status").textContent=t.calculating;
  document.getElementById("output").innerHTML="";

  try{
    let lat,lon,tzName,cityName;
    if(cityVal){
      const cd=findCity(cityVal);
      if(cd){ lat=cd.lat; lon=cd.lon; tzName=cd.tz; cityName=cityVal; }
      else if(gpsLat){ lat=gpsLat; lon=gpsLon; tzName=guessTz(lat,lon); cityName=cityVal; }
      else{
        try{
          const r=await fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(cityVal)+"&format=json&limit=1");
          const d=await r.json();
          if(!d||d.length===0) throw new Error();
          lat=+d[0].lat; lon=+d[0].lon; tzName=guessTz(lat,lon); cityName=cityVal;
        }catch(e){
          throw new Error(LANG==="hi"?"'"+cityVal+"' नहीं मिला। मुंबई, दिल्ली, लंदन जैसे शहर आज़माएं":"'"+cityVal+"' not found. Try: Mumbai, Delhi, London");
        }
      }
    } else { lat=gpsLat; lon=gpsLon; tzName=guessTz(lat,lon); cityName=LANG==="hi"?"आपका स्थान":"Your Location"; }

    const tz=getOffset(tzName,date);
    const cityDate=getCityDateStr(tz);
    if(!userPickedDate && cityDate!==date){
      date=cityDate;
      document.getElementById("date").value=date;
    }

    const nowUTC=new Date();
    const nowCity=((nowUTC.getUTCHours()*60+nowUTC.getUTCMinutes()+tz*60)%1440+1440)%1440;
    const sun=await getSun(lat,lon,date,tz);
    const isBeforeSunrise=nowCity<sun.sunrise;
    const nextD=new Date(date+"T12:00:00Z"); nextD.setUTCDate(nextD.getUTCDate()+1);
    const sun2=await getSun(lat,lon,nextD.toISOString().split("T")[0],tz);
    const prevD=new Date(date+"T12:00:00Z"); prevD.setUTCDate(prevD.getUTCDate()-1);
    const prevDateStr=prevD.toISOString().split("T")[0];
    const sunPrev=await getSun(lat,lon,prevDateStr,tz);

    const wd=new Date(date+"T12:00:00Z").getUTCDay();
    const daySeq=getDaySeqs(wd);
    const nightSeq=getNightSeq(daySeq);
    const daySeg=divide(sun.sunrise,sun.sunset);
    const nightSeg=divide(sun.sunset,sun2.sunrise+1440);
    const rahu=getPd(sun.sunrise,sun.sunset,rahuIdx[wd]);
    const yama=getPd(sun.sunrise,sun.sunset,yamaIdx[wd]);
    const kv=getPd(sun.sunrise,sun.sunset,kvIdx[wd]);
    const vv=getPd(sun.sunrise,sun.sunset,vvIdx[wd]);
    const kr=nightSeg[krIdx[wd]];
    const isToday=(date===cityDate);
    const tzSign=tz>=0?"+":"";

    // Festival of the day
    let festToday="";
    const yr=new Date(date+"T12:00:00Z").getFullYear();
    if(MY_FESTIVALS[yr]){
      MY_FESTIVALS[yr].forEach(f=>{
        if(f[0]===date) festToday+=(festToday?" | ":"")+getFestName(f);
      });
    }

    const displayName=capitalize(getDisplayName(cityName));
    const dayName=new Date(date+"T12:00:00Z").toLocaleDateString(t.locale,{weekday:"long"});

    // ── Lunar date ──
    const lunar     = getLunarInfo(date, sun.sunrise, tz);
    const tithiNum  = lunar.tithiNum;
    const tithiName = t.tithiNames[tithiNum - 1]; // correct name from 30-entry array
    const pakshaShort = !lunar.isKrishna
      ? (LANG==="hi" ? "(शु.)" : "(Shu.)")
      : (LANG==="hi" ? "(कृ.)" : "(Kr.)");
    const lunarMonth = LANG==="hi" ? lunar.monthHI : lunar.monthEN;

    // ── Build output HTML ──
    let html = "<h3>"+displayName+"</h3>";
    html += "<div style='color:#555;font-size:15px'>"+tzName+" (UTC"+tzSign+tz+"h)</div>";

    let dateLine = "<b>"+date+"</b> &nbsp; <b>"+dayName+"</b>";
    if(festToday) dateLine += " &nbsp;|&nbsp; <span style='font-weight:900;color:green'>"+festToday+"</span>";
    html += "<div style='font-size:18px;color:#111;margin:6px 0'>"+dateLine+"</div>";

    // Lunar month + tithi (purple, prominent)
    html += "<div style='font-size:17px;color:#6b3fa0;font-weight:900;margin:2px 0'>";
    html += lunarMonth + " &nbsp; " + tithiName + " " + pakshaShort;
    if(lunar.isAdhik) html += " &nbsp;<span style='background:#ff8c00;color:#fff;border-radius:4px;padding:2px 7px;font-size:14px'>Adhik Maas</span>";
    html += "</div>";

    html += t.sunrise+": <b>"+format(sun.sunrise)+"</b> &nbsp;|&nbsp; "+t.sunset+": <b>"+format(sun.sunset)+"</b><br>";

    const dayDuration = sun.sunset - sun.sunrise;
    html += "<div style='font-size:17px;font-weight:bold;margin:6px 0;color:#1a5c99'>";
    html += "<span style='color:#1a5c99;font-weight:900'>"+t.navkarsi+"</span>: <b>"+format(sun.sunrise+48)+"</b>";
    html += " &nbsp;|&nbsp; ";
    html += "<span style='color:#1a5c99;font-weight:900'>"+t.porsi+"</span>: <b>"+format(sun.sunrise+dayDuration/4)+"</b>";
    html += "</div>";

    html += "<small style='color:#888'>"+t.allTimes+" "+displayName+" "+t.localTime+" &nbsp;|&nbsp; "+t.tithi+": "+t.tithiApprox+"</small>";

    // Best Muhurat
    const best = [];
    daySeg.forEach((s,i)=>{
      const n=daySeq[i];
      if(!getGood().includes(n)) return;
      if(quality(n,s[0],rahu,yama,kv,vv,kr)===t.qBest)
        best.push(n+": "+format(s[0])+" - "+format(s[1])+t.bestSuffix);
    });
    html += '<div class="box" style="border-color:green;background:#eaffea"><b>'+t.bestTitle+'</b><br>'+(best.length?best.join("<br>"):t.noBest)+"</div>";

    // Current Muhurat
    if(isToday){
      let cur="",curQ="",curTime="",curNote="";
      if(isBeforeSunrise){
        const prevWd=new Date(prevDateStr+"T12:00:00Z").getUTCDay();
        const prevDaySeq=getDaySeqs(prevWd),prevNSeq=getNightSeq(prevDaySeq);
        const prevNSeg=divide(sunPrev.sunset,sun.sunrise+1440);
        const pRahu=getPd(sunPrev.sunrise,sunPrev.sunset,rahuIdx[prevWd]);
        const pYama=getPd(sunPrev.sunrise,sunPrev.sunset,yamaIdx[prevWd]);
        const pKv=getPd(sunPrev.sunrise,sunPrev.sunset,kvIdx[prevWd]);
        const pVv=getPd(sunPrev.sunrise,sunPrev.sunset,vvIdx[prevWd]);
        const pKr=prevNSeg[krIdx[prevWd]];
        const nowExt=nowCity+1440;
        prevNSeg.forEach((s,i)=>{
          let matches=false;
          if(s[0]>=1440&&nowExt>=s[0]&&nowExt<s[1]) matches=true;
          else if(s[0]<1440&&s[1]>1440&&nowExt>=s[0]&&nowExt<s[1]) matches=true;
          if(matches){cur=prevNSeq[i];curQ=quality(cur,s[0],pRahu,pYama,pKv,pVv,pKr);curTime=format(s[0])+" - "+format(s[1]);curNote=t.beforeSun+" "+prevDateStr;}
        });
      } else {
        daySeg.forEach((s,i)=>{
          if(nowCity>=s[0]&&nowCity<s[1]){cur=daySeq[i];curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);curTime=format(s[0])+" - "+format(s[1]);}
        });
        if(!cur){
          nightSeg.forEach((s,i)=>{
            if(s[0]<1440&&nowCity>=s[0]&&nowCity<Math.min(s[1],1440)){cur=nightSeq[i];curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);curTime=format(s[0])+" - "+format(s[1]);}
            if(s[0]<1440&&s[1]>1440&&nowCity>=s[0]){cur=nightSeq[i];curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);curTime=format(s[0])+" - "+format(s[1]);}
          });
        }
      }
      html += '<div class="box" style="border-color:blue;background:#eef4ff"><b>'+t.currentTitle+" "+displayName+"</b>";
      if(curNote) html += "<br><small style='color:#888'>"+curNote+"</small>";
      html += "<br>"+(cur?cur+" &nbsp;"+curTime+" &nbsp;"+badge(curQ):t.undetected)+"</div>";
    }

    // Rahu Yama KV VV KR
    html += "<div style='font-size:16px;margin:10px 0;line-height:2;padding:10px;background:#fff3f3;border-radius:8px;border:1px solid #ffcccc'>";
    html += "<span style='color:red;font-weight:bold'>"+t.rahu+"</span> "+format(rahu[0])+"-"+format(rahu[1]);
    html += " &nbsp; <span style='color:red;font-weight:bold'>"+t.yama+"</span> "+format(yama[0])+"-"+format(yama[1]);
    html += " &nbsp; <span style='color:red;font-weight:bold'>"+t.kv+"</span> "+format(kv[0])+"-"+format(kv[1]);
    html += " &nbsp; <span style='color:red;font-weight:bold'>"+t.vv+"</span> "+format(vv[0])+"-"+format(vv[1]);
    html += " &nbsp; <span style='color:red;font-weight:bold'>"+t.kr+"</span> "+format(kr[0])+"-"+format(kr[1]);
    html += "</div>";

    // Day Choghadiya table
    html += "<h3>"+t.dayChog+"</h3><table><tr><th>#</th><th>"+t.tableTime+"</th><th>"+t.tableName+"</th><th>"+t.tableQual+"</th></tr>";
    daySeg.forEach((s,i)=>{
      const q=quality(daySeq[i],s[0],rahu,yama,kv,vv,kr);
      const now=isToday&&!isBeforeSunrise&&nowCity>=s[0]&&nowCity<s[1];
      html += "<tr"+(now?' style="background:#fffde7;font-weight:bold"':"")+">";
      html += "<td>"+(i+1)+"</td><td>"+format(s[0])+"–"+format(s[1])+"</td><td>"+daySeq[i]+(now?t.now:"")+"</td><td>"+badge(q)+"</td></tr>";
    });
    html += "</table>";

    // Night Choghadiya table
    html += "<h3>"+t.nightChog+"</h3><table><tr><th>#</th><th>"+t.tableTime+"</th><th>"+t.tableName+"</th><th>"+t.tableQual+"</th></tr>";
    nightSeg.forEach((s,i)=>{
      const q=quality(nightSeq[i],s[0],rahu,yama,kv,vv,kr);
      const now=isToday&&!isBeforeSunrise&&s[0]<1440&&nowCity>=s[0]&&nowCity<Math.min(s[1],1440);
      html += "<tr"+(now?' style="background:#fffde7;font-weight:bold"':"")+">";
      html += "<td>"+(i+1)+"</td><td>"+format(s[0])+"–"+format(s[1])+"</td><td>"+nightSeq[i]+(now?t.now:"")+"</td><td>"+badge(q)+"</td></tr>";
    });
    html += "</table>";

    document.getElementById("output").innerHTML=html;
    document.getElementById("status").textContent=displayName+" | "+tzName+" (UTC"+tzSign+tz+"h)";

  } catch(err) {
    document.getElementById("status").textContent=err.message;
    document.getElementById("output").innerHTML='<div style="color:red;padding:12px">'+err.message+'</div>';
  }
}

// ══════════════════════════════════════════════════════════
// FESTIVAL CALENDAR
// ══════════════════════════════════════════════════════════
function toggleFestivals(){
  const box=document.getElementById("festBox");
  if(box.style.display==="none"){
    const t=T[LANG];
    const year=new Date().getFullYear();
    const fests=MY_FESTIVALS[year]||[];
    const today=getPhoneDateStr();
    if(fests.length===0){
      box.innerHTML="<h3>"+t.festTitle+"</h3><p style='padding:12px'>"+t.noFestData+" "+year+". "+t.festNote+"</p>";
      box.style.display="block"; return;
    }
    const months=t.months, days=t.days;
    let html="<h3>"+t.festTitle+" "+year+"</h3>";
    const fDH=LANG==="hi"?"तारीख":"Date", fNH=LANG==="hi"?"पर्व":"Festival";
    html += '<table class="ftable"><tr><th style="font-size:1.15rem;font-weight:900">'+fDH+'</th><th style="font-size:1.15rem;font-weight:900">'+fNH+'</th></tr>';
    let lastMo="";
    fests.forEach(f=>{
      const mo=f[0].substring(5,7);
      if(mo!==lastMo){ html+='<tr class="fmonth"><td colspan="2">'+months[parseInt(mo)-1]+" "+year+"</td></tr>"; lastMo=mo; }
      const d=new Date(f[0]+"T12:00:00Z");
      const label=days[d.getUTCDay()]+", "+d.getUTCDate()+" "+months[d.getUTCMonth()];
      const isToday=f[0]===today;
      html += '<tr class="'+(isToday?"ftoday":"")+'"><td>'+label+(isToday?t.todayLabel:"")+'</td><td class="fest-name">'+getFestName(f)+'</td></tr>';
    });
    html += "</table>";
    box.innerHTML=html; box.style.display="block";
  } else { box.style.display="none"; }
}

// ══════════════════════════════════════════════════════════
// AUTO DETECT + INIT
// ══════════════════════════════════════════════════════════
function initApp(){
  document.getElementById("date").value=getPhoneDateStr();
  applyLang();
  if(!navigator.geolocation){
    gpsLat=13.0827; gpsLon=80.2707;
    document.getElementById("city").value=LANG==="hi"?"चेन्नई":"Chennai";
    document.getElementById("status").textContent=T[LANG].defaultCity;
    calculate(); return;
  }
  navigator.geolocation.getCurrentPosition(
    async function(pos){
      gpsLat=pos.coords.latitude; gpsLon=pos.coords.longitude;
      let best="", bestDist=999;
      for(const k in CITIES){
        const c=CITIES[k], dist=Math.abs(c.lat-gpsLat)+Math.abs(c.lon-gpsLon);
        if(dist<bestDist){ bestDist=dist; best=k; }
      }
      const cityName=bestDist<2?best:"";
      const displayName=LANG==="hi"?(HINDI_CITIES[cityName]||cityName||""):capitalize(cityName);
      document.getElementById("city").value=displayName||capitalize(cityName);
      document.getElementById("status").textContent=T[LANG].detected+(displayName||capitalize(cityName));
      calculate();
    },
    async function(){
      try{
        const r=await fetch("https://ipapi.co/json/");
        const d=await r.json();
        gpsLat=d.latitude; gpsLon=d.longitude;
        const city=d.city||"Chennai";
        const displayCity=LANG==="hi"?(HINDI_CITIES[city.toLowerCase()]||city):capitalize(city);
        document.getElementById("city").value=displayCity;
        document.getElementById("status").textContent=T[LANG].ipLocation+displayCity;
        calculate();
      } catch(e){
        gpsLat=13.0827; gpsLon=80.2707;
        document.getElementById("city").value=LANG==="hi"?"चेन्नई":"Chennai";
        document.getElementById("status").textContent=T[LANG].defaultCity;
        calculate();
      }
    }
  );
}

window.addEventListener("load", function(){
  if(LANG){
    document.getElementById("langScreen").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  }
});

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js")
    .then(()=>console.log("SW registered"))
    .catch(e=>console.log("SW failed:",e));
}
