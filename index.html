/* ── Language Selector Screen ── */
#langScreen{
  display:flex;flex-direction:column;align-items:center;

  background:linear-gradient(135deg,#fff3e0,#fafafa);
  padding:30px 20px;

#langScreen .logo{

}
#langScreen h1{
  font-size:1.6rem;font-weight:900;color:#ff8c00;
  text-align:center;margin-bottom:6px;letter-spacing:1px;
}
#langScreen h2{
  font-size:1.3rem;font-weight:900;color:#333;
  text-align:center;margin-bottom:8px;
}
#langScreen p{
  font-size:1rem;color:#666;text-align:center;
  margin-bottom:30px;line-height:1.5;

.lang-btn{
  width:100%;max-width:320px;padding:18px;margin:10px 0;
  border:none;border-radius:14px;font-size:1.3rem;
  font-weight:900;cursor:pointer;letter-spacing:1px;
  transition:transform .1s,box-shadow .1s;
}
.lang-btn:active{transform:scale(0.97);}
.btn-english{
  background:#ff8c00;color:#fff;
  box-shadow:0 4px 12px rgba(255,140,0,.4);
}
.btn-hindi{
  background:#138808;color:#fff;
  box-shadow:0 4px 12px rgba(19,136,8,.4);
}
.lang-note{
  font-size:0.85rem;color:#999;text-align:center;
  margin-top:20px;
}

/* ── Main App ── */

.app-header{
  background:#ff8c00;color:#fff;
  padding:8px 12px;
  display:flex;justify-content:space-between;align-items:center;
}
.app-header h2{font-size:1rem;font-weight:900;}
.lang-switch{
  font-size:0.8rem;font-weight:700;
  background:rgba(255,255,255,.25);
  border:1px solid rgba(255,255,255,.5);
  color:#fff;padding:4px 10px;border-radius:20px;
  cursor:pointer;
}
.app-body{max-width:720px;margin:0 auto;padding:10px;}

/* ── App Styles ── */
input,button{padding:12px;margin:6px 0;width:100%;font-size:17px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{background:#ff8c00;color:white;font-weight:bold;border:none;cursor:pointer;}
button:hover{background:#e07800;}
table{border-collapse:collapse;width:100%;margin-top:15px;background:white;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;font-size:16px;}
th{background:#f0f0f0;}
.box{margin-top:15px;padding:12px;border:2px solid;border-radius:6px;}
#status{font-size:14px;color:#666;text-align:center;padding:4px;}
#festBox{display:none;margin-top:12px;background:#fff;border:2px solid #ccc;border-radius:8px;overflow:hidden;}
#festBox h3{background:#ff8c00;color:#fff;margin:0;padding:12px 16px;font-size:1.1rem;}
.ftable{width:100%;border-collapse:collapse;}
.ftable th{background:#ffe0b2;padding:10px 14px;font-size:1.2rem;font-weight:900;text-align:center;border-bottom:2px solid #ccc;}
.ftable td{padding:10px 14px;font-size:1.05rem;font-weight:bold;border-bottom:1px solid #eee;color:#111;vertical-align:middle;text-align:center;}
.ftable tr:nth-child(even) td{background:#fff8f0;}
.fmonth td{background:#ff8c00!important;color:#fff!important;font-weight:900;font-size:1.1rem;}
.ftoday td{background:#fff9c4!important;font-weight:900;}

  document.getElementById("app").style.display="block";
  initApp();
}

// Capitalize first letter of each word
function capitalize(str){
  if(!str) return str;
  return str.split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
}

function getPhoneDateStr(){
  let n=new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function getCityDateStr(tzOffset){
  let now=new Date();
  let cityMs=now.getTime()+tzOffset*3600000;
  let cityDate=new Date(cityMs);
  return cityDate.getUTCFullYear()+"-"+String(cityDate.getUTCMonth()+1).padStart(2,"0")+"-"+String(cityDate.getUTCDate()).padStart(2,"0");
}

function format(m){
  m=((m%1440)+1440)%1440;
  let h=Math.floor(m/60),mm=Math.round(m%60);
  let ampm=h<12?"AM":"PM",h12=h%12===0?12:h%12;
  return h12+":"+String(mm).padStart(2,"0")+" "+ampm;
}

function divide(s,e){let p=(e-s)/8,a=[];for(let i=0;i<8;i++)a.push([s+i*p,s+(i+1)*p]);return a;}
function inP(t,s,e){return t>=s&&t<e;}

function getDisplayName(englishName){
  if(LANG==="hi"){
    let k=englishName.trim().toLowerCase();
    return HINDI_CITIES[k]||englishName;
  }
  return englishName;
}

function findCity(name){
  let k=name.trim().toLowerCase();
  if(CITIES[k])return CITIES[k];
  for(let key in CITIES){if(key.includes(k)||k.includes(key))return CITIES[key];}
  return null;
}

function getOffset(tzName,dateStr){
  try{
    let d=new Date(dateStr+"T12:00:00Z");
    let a=new Date(d.toLocaleString("en-US",{timeZone:tzName}));
    let b=new Date(d.toLocaleString("en-US",{timeZone:"UTC"}));
    return(a-b)/3600000;
  }catch(e){return 5.5;}
}

function guessTz(lat,lon){
  if(lon>=68&&lon<=98&&lat>=6&&lat<=38)return"Asia/Kolkata";
  if(lon>=80&&lon<=89&&lat>=26&&lat<=31)return"Asia/Kathmandu";
  if(lon>=-10&&lon<=2&&lat>=49&&lat<=61)return"Europe/London";
  if(lon>=44&&lon<=60&&lat>=20&&lat<=40)return"Asia/Dubai";
  if(lon>=-80&&lon<=-65&&lat>=25&&lat<=50)return"America/New_York";
  if(lon>=-100&&lon<=-80&&lat>=25&&lat<=50)return"America/Chicago";
  if(lon>=-120&&lon<=-100&&lat>=25&&lat<=50)return"America/Los_Angeles";
  if(lon>=100&&lon<=145&&lat>=30&&lat<=50)return"Asia/Tokyo";
  return"UTC";
}

async function getSun(lat,lon,date,tz){
  let r=await fetch("https://api.sunrise-sunset.org/json?lat="+lat+"&lng="+lon+"&date="+date+"&formatted=0");
  let d=await r.json();
  if(!d||d.status!=="OK")throw new Error(LANG==="hi"?"सूर्योदय-सूर्यास्त नहीं मिला। इंटरनेट जांचें।":"Cannot get sun times. Check internet.");
  function toLocal(u){
    let utcMins=new Date(u).getUTCHours()*60+new Date(u).getUTCMinutes();
    return((utcMins+tz*60)%1440+1440)%1440;
  }
  return{sunrise:toLocal(d.results.sunrise),sunset:toLocal(d.results.sunset)};
}

const DAY_SEQS_EN={
  0:["Udveg","Char","Labh","Amrit","Kaal","Shubh","Rog","Udveg"],
  1:["Amrit","Kaal","Shubh","Rog","Udveg","Char","Labh","Amrit"],
  2:["Rog","Udveg","Char","Labh","Amrit","Kaal","Shubh","Rog"],
  3:["Labh","Amrit","Kaal","Shubh","Rog","Udveg","Char","Labh"],
  4:["Shubh","Rog","Udveg","Char","Labh","Amrit","Kaal","Shubh"],
  5:["Char","Labh","Amrit","Kaal","Shubh","Rog","Udveg","Char"],
  6:["Kaal","Shubh","Rog","Udveg","Char","Labh","Amrit","Kaal"]
};
const DAY_SEQS_HI={
  0:["उद्वेग","चर","लाभ","अमृत","काल","शुभ","रोग","उद्वेग"],
  1:["अमृत","काल","शुभ","रोग","उद्वेग","चर","लाभ","अमृत"],
  2:["रोग","उद्वेग","चर","लाभ","अमृत","काल","शुभ","रोग"],
  3:["लाभ","अमृत","काल","शुभ","रोग","उद्वेग","चर","लाभ"],
  4:["शुभ","रोग","उद्वेग","चर","लाभ","अमृत","काल","शुभ"],
  5:["चर","लाभ","अमृत","काल","शुभ","रोग","उद्वेग","चर"],
  6:["काल","शुभ","रोग","उद्वेग","चर","लाभ","अमृत","काल"]
};
const CYCLE_EN=["Amrit","Char","Rog","Kaal","Labh","Udveg","Shubh"];
const CYCLE_HI=["अमृत","चर","रोग","काल","लाभ","उद्वेग","शुभ"];
const GOOD_EN=["Amrit","Shubh","Labh"];
const GOOD_HI=["अमृत","शुभ","लाभ"];
const CHAR_EN="Char"; const CHAR_HI="चर";

function getDaySeqs(wd){return LANG==="hi"?DAY_SEQS_HI[wd]:DAY_SEQS_EN[wd];}
function getCycle(){return LANG==="hi"?CYCLE_HI:CYCLE_EN;}
function getGood(){return LANG==="hi"?GOOD_HI:GOOD_EN;}
function getChar(){return LANG==="hi"?CHAR_HI:CHAR_EN;}

function getNightSeq(d){
  let cycle=getCycle();
  let idx=(cycle.indexOf(d[7])+1)%7,n=[];
  for(let i=0;i<8;i++)n.push(cycle[(idx+i)%7]);
  return n;
}

const rahuIdx=[7,1,6,4,5,3,2];
const yamaIdx=[4,3,2,1,0,6,5];
const kvIdx={0:4,1:1,2:5,3:2,4:6,5:3,6:0};
const vvIdx={0:3,1:6,2:1,3:4,4:7,5:2,6:5};
const krIdx={0:5,1:3,2:1,3:6,4:4,5:2,6:0};
function getPd(sr,ss,i){let p=(ss-sr)/8;return[sr+p*i,sr+p*(i+1)];}

function quality(n,s,rahu,yama,kv,vv,kr){
  let t=T[LANG];
  if(inP(s,rahu[0],rahu[1]))return t.qRahu;
  if(inP(s,yama[0],yama[1]))return t.qYama;
  if(inP(s,kv[0],kv[1]))   return t.qKV;
  if(inP(s,vv[0],vv[1]))   return t.qVV;
  if(inP(s,kr[0],kr[1]))   return t.qKR;
  if(getGood().includes(n)) return t.qBest;
  if(n===getChar())         return t.qGood;
  return t.qInauspicious;
}

function badge(q){
  let t=T[LANG];
  if(q===t.qBest) return t.badgeBest;
  if(q===t.qGood) return t.badgeGood;
  return'<span style="color:red;font-weight:bold">'+q+'</span>';
}

let gpsLat=null,gpsLon=null,userPickedDate=false;

document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("date").addEventListener("change",function(){
    userPickedDate=true; calculate();
  });
  let autoTimer=null;
  document.getElementById("city").addEventListener("input",function(){
    clearTimeout(autoTimer);
    userPickedDate=false;
    if(document.getElementById("city").value.trim().length>=3)
      autoTimer=setTimeout(calculate,1500);
  });
});

async function calculate(){
  if(!LANG)return;
  let t=T[LANG];
  let cityVal=document.getElementById("city").value.trim();
  let date=document.getElementById("date").value;
  if(!cityVal&&!gpsLat)return;
  if(!date){date=getPhoneDateStr();document.getElementById("date").value=date;}

  document.getElementById("status").textContent=t.calculating;
  document.getElementById("output").innerHTML="";

  try{
    let lat,lon,tzName,cityName;
    if(cityVal){
      let cd=findCity(cityVal);
      if(cd){lat=cd.lat;lon=cd.lon;tzName=cd.tz;cityName=cityVal;}
      else if(gpsLat){lat=gpsLat;lon=gpsLon;tzName=guessTz(lat,lon);cityName=cityVal;}
      else{
        try{
          let r=await fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(cityVal)+"&format=json&limit=1");
          let d=await r.json();
          if(!d||d.length===0)throw new Error();
          lat=+d[0].lat;lon=+d[0].lon;tzName=guessTz(lat,lon);cityName=cityVal;
        }catch(e){
          throw new Error(LANG==="hi"?"'"+cityVal+"' नहीं मिला। मुंबई, दिल्ली, लंदन जैसे शहर आज़माएं":"'"+cityVal+"' not found. Try: Mumbai, Delhi, London");
        }
      }
    }else{lat=gpsLat;lon=gpsLon;tzName=guessTz(lat,lon);cityName=LANG==="hi"?"आपका स्थान":"Your Location";}

    let tz=getOffset(tzName,date);
    let cityDate=getCityDateStr(tz);
    if(!userPickedDate&&cityDate!==date){
      date=cityDate;
      document.getElementById("date").value=date;
    }

    let nowUTC=new Date();
    let nowCity=((nowUTC.getUTCHours()*60+nowUTC.getUTCMinutes()+tz*60)%1440+1440)%1440;
    let sun=await getSun(lat,lon,date,tz);
    let isBeforeSunrise=nowCity<sun.sunrise;
    let next=new Date(date+"T12:00:00Z");next.setUTCDate(next.getUTCDate()+1);
    let sun2=await getSun(lat,lon,next.toISOString().split("T")[0],tz);
    let prev=new Date(date+"T12:00:00Z");prev.setUTCDate(prev.getUTCDate()-1);
    let prevDateStr=prev.toISOString().split("T")[0];
    let sunPrev=await getSun(lat,lon,prevDateStr,tz);

    let wd=new Date(date+"T12:00:00Z").getUTCDay();
    let daySeq=getDaySeqs(wd);
    let nightSeq=getNightSeq(daySeq);
    let daySeg=divide(sun.sunrise,sun.sunset);
    let nightSeg=divide(sun.sunset,sun2.sunrise+1440);
    let rahu=getPd(sun.sunrise,sun.sunset,rahuIdx[wd]);
    let yama=getPd(sun.sunrise,sun.sunset,yamaIdx[wd]);
    let kv=getPd(sun.sunrise,sun.sunset,kvIdx[wd]);
    let vv=getPd(sun.sunrise,sun.sunset,vvIdx[wd]);
    let kr=nightSeg[krIdx[wd]];
    let isToday=(date===cityDate);
    let tzSign=tz>=0?"+":"";

    // Festival of the day
    let festToday="";
    let yr=new Date(date+"T12:00:00Z").getFullYear();
    if(MY_FESTIVALS[yr]){
      MY_FESTIVALS[yr].forEach(f=>{
        if(f[0]===date)festToday+=(festToday?" | ":"")+getFestName(f);
      });
    }

    let displayName=capitalize(getDisplayName(cityName));
    let dayName=new Date(date+"T12:00:00Z").toLocaleDateString(t.locale,{weekday:"long"});
    let html="<h3>"+displayName+"</h3>";
    html+="<div style='color:#555;font-size:15px'>"+tzName+" (UTC"+tzSign+tz+"h)</div>";
    let dateLine="<b>"+date+"</b> &nbsp; <b>"+dayName+"</b>";
    if(festToday)dateLine+=" &nbsp;|&nbsp; <span style='font-weight:900;color:green'>"+festToday+"</span>";
    html+="<div style='font-size:18px;color:#111;margin:6px 0'>"+dateLine+"</div>";
    html+=t.sunrise+": <b>"+format(sun.sunrise)+"</b> &nbsp;|&nbsp; "+t.sunset+": <b>"+format(sun.sunset)+"</b><br>";
    html+="<small style='color:#888'>"+t.allTimes+" "+displayName+" "+t.localTime+"</small>";

    // Best Muhurat
    let best=[];
    daySeg.forEach((s,i)=>{
      let n=daySeq[i];
      if(!getGood().includes(n))return;
      if(quality(n,s[0],rahu,yama,kv,vv,kr)===t.qBest)
        best.push(n+": "+format(s[0])+" - "+format(s[1])+t.bestSuffix);
    });
    html+='<div class="box" style="border-color:green;background:#eaffea"><b>'+t.bestTitle+'</b><br>'+(best.length?best.join("<br>"):t.noBest)+"</div>";

    // Current Muhurat
    if(isToday){
      let cur="",curQ="",curTime="",curNote="";
      if(isBeforeSunrise){
        let prevWd=new Date(prevDateStr+"T12:00:00Z").getUTCDay();
        let prevDaySeq=getDaySeqs(prevWd);
        let prevNSeq=getNightSeq(prevDaySeq);
        let prevNSeg=divide(sunPrev.sunset,sun.sunrise+1440);
        let pRahu=getPd(sunPrev.sunrise,sunPrev.sunset,rahuIdx[prevWd]);
        let pYama=getPd(sunPrev.sunrise,sunPrev.sunset,yamaIdx[prevWd]);
        let pKv=getPd(sunPrev.sunrise,sunPrev.sunset,kvIdx[prevWd]);
        let pVv=getPd(sunPrev.sunrise,sunPrev.sunset,vvIdx[prevWd]);
        let pKr=prevNSeg[krIdx[prevWd]];
        let nowExt=nowCity+1440;
        prevNSeg.forEach((s,i)=>{
          let matches=false;
          if(s[0]>=1440&&nowExt>=s[0]&&nowExt<s[1])matches=true;
          else if(s[0]<1440&&s[1]>1440&&nowExt>=s[0]&&nowExt<s[1])matches=true;
          if(matches){
            cur=prevNSeq[i];curQ=quality(cur,s[0],pRahu,pYama,pKv,pVv,pKr);
            curTime=format(s[0])+" - "+format(s[1]);
            curNote=t.beforeSun+" "+prevDateStr;
          }
        });
      }else{
        daySeg.forEach((s,i)=>{
          if(nowCity>=s[0]&&nowCity<s[1]){
            cur=daySeq[i];curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);
            curTime=format(s[0])+" - "+format(s[1]);
          }
        });
        if(!cur){
          nightSeg.forEach((s,i)=>{
            if(s[0]<1440&&nowCity>=s[0]&&nowCity<Math.min(s[1],1440)){
              cur=nightSeq[i];curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);
              curTime=format(s[0])+" - "+format(s[1]);
            }
            if(s[0]<1440&&s[1]>1440&&nowCity>=s[0]){
              cur=nightSeq[i];curQ=quality(cur,s[0],rahu,yama,kv,vv,kr);
              curTime=format(s[0])+" - "+format(s[1]);
            }
          });
        }
      }
      html+='<div class="box" style="border-color:blue;background:#eef4ff">';
      html+="<b>"+t.currentTitle+" "+displayName+"</b>";
      if(curNote)html+="<br><small style='color:#888'>"+curNote+"</small>";
      html+="<br>"+(cur?cur+" &nbsp;"+curTime+" &nbsp;"+badge(curQ):t.undetected);
      html+="</div>";
    }

    // Rahu Yama KV VV KR — shown after Current Muhurat
    html+="<div style='font-size:16px;margin:10px 0;line-height:2;padding:10px;background:#fff3f3;border-radius:8px;border:1px solid #ffcccc'>";
    html+="<span style='color:red;font-weight:bold'>"+t.rahu+"</span> "+format(rahu[0])+"-"+format(rahu[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>"+t.yama+"</span> "+format(yama[0])+"-"+format(yama[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>"+t.kv+"</span> "+format(kv[0])+"-"+format(kv[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>"+t.vv+"</span> "+format(vv[0])+"-"+format(vv[1]);
    html+=" &nbsp; <span style='color:red;font-weight:bold'>"+t.kr+"</span> "+format(kr[0])+"-"+format(kr[1]);
    html+="</div>";

    html+="<h3>"+t.dayChog+"</h3><table><tr><th>#</th><th>"+t.tableTime+"</th><th>"+t.tableName+"</th><th>"+t.tableQual+"</th></tr>";
    daySeg.forEach((s,i)=>{
      let q=quality(daySeq[i],s[0],rahu,yama,kv,vv,kr);
      let now=isToday&&!isBeforeSunrise&&nowCity>=s[0]&&nowCity<s[1];
      html+="<tr"+(now?' style="background:#fffde7;font-weight:bold"':"")+">";
      html+="<td>"+(i+1)+"</td><td>"+format(s[0])+"–"+format(s[1])+"</td><td>"+daySeq[i]+(now?t.now:"")+"</td><td>"+badge(q)+"</td></tr>";
    });
    html+="</table>";

    html+="<h3>"+t.nightChog+"</h3><table><tr><th>#</th><th>"+t.tableTime+"</th><th>"+t.tableName+"</th><th>"+t.tableQual+"</th></tr>";
    nightSeg.forEach((s,i)=>{
      let q=quality(nightSeq[i],s[0],rahu,yama,kv,vv,kr);
      let now=isToday&&!isBeforeSunrise&&s[0]<1440&&nowCity>=s[0]&&nowCity<Math.min(s[1],1440);
      html+="<tr"+(now?' style="background:#fffde7;font-weight:bold"':"")+">";
      html+="<td>"+(i+1)+"</td><td>"+format(s[0])+"–"+format(s[1])+"</td><td>"+nightSeq[i]+(now?t.now:"")+"</td><td>"+badge(q)+"</td></tr>";
    });
    html+="</table>";

    document.getElementById("output").innerHTML=html;
    document.getElementById("status").textContent=displayName+" | "+tzName+" (UTC"+tzSign+tz+"h)";

  }catch(err){
    document.getElementById("status").textContent=err.message;
    document.getElementById("output").innerHTML='<div style="color:red;padding:12px">'+err.message+'</div>';
  }
}

function toggleFestivals(){
  let box=document.getElementById("festBox");
  if(box.style.display==="none"){
    let t=T[LANG];
    let year=new Date().getFullYear();
    let fests=MY_FESTIVALS[year]||[];
    let today=getPhoneDateStr();
    if(fests.length===0){
      box.innerHTML="<h3>"+t.festTitle+"</h3><p style='padding:12px'>"+t.noFestData+" "+year+". "+t.festNote+"</p>";
      box.style.display="block";return;
    }
    let months=t.months;
    let days=t.days;
    let html="<h3>"+t.festTitle+" "+year+"</h3>";
    let festDateHeader = LANG==="hi" ? "तारीख" : "Date";
    let festNameHeader = LANG==="hi" ? "पर्व"  : "Festival";
    html+='<table class="ftable"><tr><th style="font-size:1.15rem;font-weight:900">'+festDateHeader+'</th><th style="font-size:1.15rem;font-weight:900">'+festNameHeader+'</th></tr>';
    let lastMo="";
    fests.forEach(f=>{
      let mo=f[0].substring(5,7);
      if(mo!==lastMo){
        html+='<tr class="fmonth"><td colspan="2">'+months[parseInt(mo)-1]+" "+year+"</td></tr>";
        lastMo=mo;
      }
      let d=new Date(f[0]+"T12:00:00Z");
      let label=days[d.getUTCDay()]+", "+d.getUTCDate()+" "+months[d.getUTCMonth()];
      let isToday=f[0]===today;
      html+='<tr class="'+(isToday?"ftoday":"")+'"><td>'+label+(isToday?t.todayLabel:"")+'</td>';
      html+='<td class="fest-name">'+getFestName(f)+'</td></tr>';
    });
    html+="</table>";
    box.innerHTML=html;box.style.display="block";
  }else{box.style.display="none";}
}

function initApp(){
  document.getElementById("date").value=getPhoneDateStr();
  applyLang();

  if(!navigator.geolocation){
    gpsLat=13.0827;gpsLon=80.2707;
    document.getElementById("city").value=LANG==="hi"?"चेन्नई":"Chennai";
    document.getElementById("status").textContent=T[LANG].defaultCity;
    calculate();return;
  }
  navigator.geolocation.getCurrentPosition(
    async function(pos){
      gpsLat=pos.coords.latitude;gpsLon=pos.coords.longitude;
      let best="",bestDist=999;
      for(let k in CITIES){
        let c=CITIES[k];
        let dist=Math.abs(c.lat-gpsLat)+Math.abs(c.lon-gpsLon);
        if(dist<bestDist){bestDist=dist;best=k;}
      }
      let cityName=bestDist<2?best:"";
      let displayName=LANG==="hi"?(HINDI_CITIES[cityName]||cityName||""):capitalize(cityName);
      document.getElementById("city").value=displayName||capitalize(cityName);
      document.getElementById("status").textContent=T[LANG].detected+(displayName||capitalize(cityName));
      calculate();
    },
    async function(){
      try{
        let r=await fetch("https://ipapi.co/json/");
        let d=await r.json();
        gpsLat=d.latitude;gpsLon=d.longitude;
        let city=d.city||"Chennai";
        let displayCity=LANG==="hi"?(HINDI_CITIES[city.toLowerCase()]||city):capitalize(city);
        document.getElementById("city").value=displayCity;
        document.getElementById("status").textContent=T[LANG].ipLocation+displayCity;
        calculate();
      }catch(e){
        gpsLat=13.0827;gpsLon=80.2707;
        document.getElementById("city").value=LANG==="hi"?"चेन्नई":"Chennai";
        document.getElementById("status").textContent=T[LANG].defaultCity;
        calculate();
      }
    }
  );
}

// ── On page load — check if language already chosen ──
window.addEventListener("load",function(){
  if(LANG){
    // Language already saved — skip selector
    document.getElementById("langScreen").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  }
  // else show language selector (already visible by default)
});

// Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js")
    .then(()=>console.log("SW registered"))
    .catch(e=>console.log("SW failed:",e));
}
